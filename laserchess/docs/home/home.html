<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess | Lobby</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
  <script type="module" src="./tutorials.js"></script>
</head>

<body class="min-h-screen w-full flex flex-col m-0 p-0 text-white bg-black">
  
  <!-- [Header & Nav sections same as before] -->

  <!-- RULES SECTION -->
  <section id="the-rules" class="relative z-10 w-full bg-black/60 backdrop-blur-sm border-t border-theme-20 py-32 px-10">
    <div class="max-w-7xl mx-auto">
      <!-- Legend & Rules Header... -->

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- KING -->
        <div class="rule-card relative p-8 cursor-pointer border border-white/10 hover:border-white/30 transition-all" onclick="togglePieceTutorial(this, 'KING')">
          <h4 class="text-theme font-black mb-6">KING</h4>
          <div class="sandbox-container mt-4 p-4 bg-black/80 border border-white/5 rounded-lg flex flex-col items-center">
            <svg viewBox="0 0 100 100" class="w-24 h-24">
              <rect x="20" y="20" width="60" height="60" fill="none" stroke="#f44336" stroke-width="4"/>
              <circle cx="50" cy="50" r="15" fill="#f44336"/>
            </svg>
          </div>
        </div>

        <!-- SWITCH -->
        <div class="rule-card relative p-8 cursor-pointer border border-white/10 hover:border-white/30 transition-all" onclick="togglePieceTutorial(this, 'SWITCH')">
          <h4 class="text-theme font-black mb-6">SWITCH</h4>
          <div class="sandbox-container mt-4 p-4 bg-black/80 border border-white/5 rounded-lg flex flex-col items-center">
            <svg viewBox="0 0 100 100" class="w-24 h-24">
              <rect x="20" y="20" width="60" height="60" fill="none" stroke="#03e9f4" stroke-width="4"/>
              <line x1="20" y1="20" x2="80" y2="80" stroke="#03e9f4" stroke-width="4"/>
            </svg>
          </div>
        </div>

        <!-- DEFENDER -->
        <div class="rule-card relative p-8 cursor-pointer border border-white/10 hover:border-white/30 transition-all" onclick="togglePieceTutorial(this, 'DEFENDER')">
          <h4 class="text-theme font-black mb-6">DEFENDER</h4>
          <div class="sandbox-container mt-4 p-4 bg-black/80 border border-white/5 rounded-lg flex flex-col items-center">
            <svg viewBox="0 0 100 100" class="w-24 h-24">
              <path d="M20 20 L80 20 L80 50 Q50 80 20 50 Z" fill="none" stroke="#4ade80" stroke-width="4"/>
            </svg>
          </div>
        </div>

        <!-- DEFLECTOR -->
        <div class="rule-card relative p-8 cursor-pointer border border-white/10 hover:border-white/30 transition-all" onclick="togglePieceTutorial(this, 'DEFLECTOR')">
          <h4 class="text-theme font-black mb-6">DEFLECTOR</h4>
          <div class="sandbox-container mt-4 p-4 bg-black/80 border border-white/5 rounded-lg flex flex-col items-center">
            <svg viewBox="0 0 100 100" class="w-24 h-24">
              <rect x="20" y="20" width="60" height="60" fill="none" stroke="#fbbf24" stroke-width="4"/>
              <line x1="20" y1="80" x2="80" y2="20" stroke="#fbbf24" stroke-width="4"/>
            </svg>
          </div>
        </div>

        <!-- LASER -->
        <div class="rule-card relative p-8 cursor-pointer border border-white/10 hover:border-white/30 transition-all" onclick="togglePieceTutorial(this, 'LASER')">
          <h4 class="text-theme font-black mb-6">LASER</h4>
          <div class="sandbox-container mt-4 p-4 bg-black/80 border border-white/5 rounded-lg flex flex-col items-center">
            <svg viewBox="0 0 100 100" class="w-24 h-24">
              <rect x="20" y="20" width="60" height="60" fill="#333" stroke="#fff" stroke-width="2"/>
              <rect x="40" y="0" width="20" height="20" fill="#f44336"/>
            </svg>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- [Rest of your content] -->

</body>
</html>
