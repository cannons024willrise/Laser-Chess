<section id="the-rules" class="relative z-10 w-full bg-black/60 backdrop-blur-sm border-t border-theme-20 py-32 px-10 md:px-20 lg:px-40">
  <div class="max-w-7xl mx-auto">
    
    <div class="mb-12 p-8 bg-theme-10 border border-theme-20 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
      <div class="flex flex-col gap-2">
        <h3 class="text-white font-black tracking-widest uppercase text-sm">Interactive Training Modules</h3>
        <p class="text-[10px] text-gray-400 font-mono uppercase tracking-widest">
          Click any target piece below to initialize the live physics sandbox simulator.
        </p>
      </div>
      
      <div class="flex flex-wrap gap-6 text-[10px] font-mono uppercase text-gray-400 bg-black/40 p-4 rounded border border-white/5">
        <div class="flex items-center gap-2"><span class="w-4 h-4 bg-emerald-500/20 border border-emerald-500/50"></span> Legal Move</div>
        <div class="flex items-center gap-2"><span class="w-4 h-4 border border-cyan-400/80"></span> Selected</div>
        <div class="flex items-center gap-2"><span class="w-6 h-1 bg-cyan-400"></span> Active Laser</div>
      </div>
    </div>

    <div class="mb-24 text-left border-l-4 border-theme pl-8">
      <h2 class="text-5xl md:text-7xl lg:text-8xl font-black italic tracking-tighter uppercase leading-none drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">THE RULES</h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="rule-card relative p-8 cursor-pointer select-none group transition-all duration-300 hover:scale-[1.01]"
           data-tutorial-id="KING"
           onclick="togglePieceTutorial(this, 'KING')">
        </div>

      <div class="rule-card relative p-8 cursor-pointer select-none group transition-all duration-300 hover:scale-[1.01]"
           data-tutorial-id="SWITCH"
           onclick="togglePieceTutorial(this, 'SWITCH')">
        </div>
      
      </div>
    
  </div>
</section>
