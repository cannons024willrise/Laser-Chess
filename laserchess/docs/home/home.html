<main class="flex-grow flex flex-col justify-between items-center py-12 relative z-10 w-screen h-full overflow-hidden">
  
  <div class="text-center mt-8 mb-16 lg:mb-24">
    <h1 class="text-6xl md:text-8xl lg:text-6xl font-black text-white tracking-[0.25em] uppercase italic">
      READY FOR BATTLE?
    </h1>
    <p class="text-gray-500 text-xs md:text-sm tracking-[0.8em] uppercase mt-6 opacity-80">
      Select your side and enter the queue
    </p>
  </div>

  <div class="w-full flex flex-col lg:flex-row items-center justify-between px-10 md:px-20 lg:px-40 gap-12 lg:gap-0 mb-auto">
    
    <div class="w-full lg:w-[450px] transform lg:-translate-x-12">
      <div id="lobbyStatus" class="p-16 bg-black/90 backdrop-blur-2xl lobby-pulse border-2 border-cyan-400/30 text-center shadow-[0_0_50px_rgba(0,0,0,0.8)]">
        <p id="statusText" class="text-cyan-400 tracking-[0.5em] uppercase text-xs mb-8 opacity-70">
          SCANNING LOBBY...
        </p>
        <div id="oppPreview" class="text-white text-4xl lg:text-5xl font-black tracking-widest uppercase italic leading-tight">
          STATUS: <br>
          <span id="statusValue" class="text-gray-600 block mt-2">IDLE</span>
        </div>
      </div>
    </div>

    <div class="w-full lg:w-[500px] flex flex-col items-center space-y-16 transform lg:translate-x-12">
      
      <div class="flex items-center space-x-12 scale-110 lg:scale-125">
        <span class="text-red-600 font-black tracking-[0.2em] uppercase text-2xl drop-shadow-[0_0_10px_rgba(220,38,38,0.5)]">RED</span>
        <label class="switch">
          <input type="checkbox" id="sideToggle">
          <span class="slider"></span>
        </label>
        <span class="text-cyan-400 font-black tracking-[0.2em] uppercase text-2xl drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">BLUE</span>
      </div>

      <div class="w-full space-y-6">
        <button id="mainActionBtn" class="play-now-btn w-full h-24 lg:h-28 text-xl lg:text-2xl font-black tracking-[0.4em]">
          <div class="btn-clipper">
            <span></span><span></span><span></span><span></span>
          </div>
          <span id="mainBtnLabel" class="relative z-20">CREATE MATCH</span>
        </button>
        
        <button id="followBtn" class="hidden w-full text-xs text-gray-400 hover:text-white transition-all uppercase tracking-[0.5em] cursor-pointer text-center font-bold">
          Host new match instead
        </button>
      </div>

    </div>
  </div>

  <div class="mb-12"></div>
</main>
