<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess | Lobby</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="blue.css">

  <!-- Logic Modules -->
  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-black overflow-x-hidden">
  <!-- Navigation Header -->
  <header class="lobby-header z-50">
    <h1 class="logo-text">LASER CHESS</h1>
    <div class="user-meta">
      <span id="userEmail">ACCOUNT_SYNCING...</span>
      <button id="signOutBtn">Sign Out</button>
    </div>
  </header>

  <!-- Community Banner -->
  <section class="discord-bar z-40">
    <a href="https://discord.gg/mbEuNMee">Join Our Discord Community</a>
  </section>

  <!-- Main Content Area -->
  <main class="lobby-container z-30">
    
    <!-- Title Section -->
    <div class="hero-text-block">
      <h1 class="hero-title">READY FOR BATTLE?</h1>
      <p class="hero-subtitle">Select your side and enter the queue</p>
    </div>

    <!-- UI WRAPPER: This holds the two sides apart -->
    <div class="battle-station-wrapper">
      
      <!-- LEFT SIDE: STATUS -->
      <div class="status-side">
        <div id="lobbyStatus" class="status-box">
          <p id="statusText" class="status-top-label">Scanning Lobby...</p>
          <div class="status-main-display">
            STATUS: <span id="statusValue">IDLE</span>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE: CONTROLS -->
      <div class="controls-side">
        <!-- Theme Toggle Row -->
        <div class="selector-row">
          <span class="side-label side-red">RED</span>
          <label class="switch">
            <input type="checkbox" id="sideToggle">
            <span class="slider"></span>
          </label>
          <span class="side-label side-blue">BLUE</span>
        </div>

        <!-- Create Button Row -->
        <div class="button-row">
          <button id="mainActionBtn" class="battle-btn">
            <div class="btn-glow-lines">
              <span></span><span></span><span></span><span></span>
            </div>
            <span id="mainBtnLabel">CREATE MATCH</span>
          </button>
          
          <button id="followBtn" class="hidden ghost-btn">
            Host new match instead
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="lobby-footer">
    ALPHA BUILD v1.0 // <a href="mailto:later5143@gmail.com">REPORT_GLITCH</a>
  </footer>
</body>
</html>
