<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess | Lobby</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="blue.css">

  <!-- Logic Modules -->
  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
</head>

<body class="min-h-screen flex flex-col overflow-x-hidden">
  <!-- Navigation Header -->
  <header class="flex justify-between items-center p-4 bg-white shadow z-10">
    <div class="flex items-center space-x-4">
      <h1 class="text-2xl font-bold tracking-tighter">LASER CHESS</h1>
    </div>
    <div class="flex items-center space-x-6 text-sm">
      <span id="userEmail" class="text-cyan-400 font-medium">ACCOUNT_SYNCING...</span>
      <button id="signOutBtn" class="opacity-50 hover:opacity-100 transition-opacity uppercase font-bold tracking-widest">Sign Out</button>
    </div>
  </header>

  <!-- Community Banner -->
  <section class="p-3 bg-indigo-600 text-white text-center discord-banner z-10">
    <a href="https://discord.gg/mbEuNMee" class="text-xs font-bold tracking-[0.2em] uppercase hover:text-cyan-400 transition-colors">
      Join Our Discord Community
    </a>
  </section>

  <!-- Main Matchmaking Section -->
  <main class="flex flex-col items-center justify-center py-20 space-y-12 flex-grow relative z-10">
    <div class="text-center space-y-2">
      <h1 class="text-4xl md:text-6xl font-bold text-white tracking-[0.15em] uppercase">
        Ready for Battle?
      </h1>
      <p class="text-gray-400 text-xs tracking-[0.4em] uppercase">Select your side and enter the queue</p>
    </div>

    <!-- Brutalist Geometric Toggle -->
    <div class="flex items-center space-x-8">
      <span class="text-red-500 font-black tracking-widest uppercase text-xl">RED</span>
      <label class="switch">
        <input type="checkbox" id="sideToggle">
        <span class="slider"></span>
      </label>
      <span class="text-cyan-400 font-black tracking-widest uppercase text-xl">BLUE</span>
    </div>

    <!-- Matchmaking Console -->
    <div id="requests" class="w-full max-w-md px-6 flex flex-col items-center space-y-8 mt-4">
      
      <!-- Pulsing Lobby Status Card -->
      <div id="lobbyStatus" class="w-full p-8 bg-black/60 backdrop-blur-md text-center shadow-2xl lobby-pulse border border-transparent">
        <p id="statusText" class="text-cyan-400 tracking-[0.3em] uppercase text-[10px] mb-4 opacity-80">
          Scanning Lobby...
        </p>
        <div id="oppPreview" class="text-white text-2xl font-black tracking-widest uppercase">
          STATUS: <span id="statusValue" class="text-gray-600">FREE</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col items-center w-full space-y-6">
        
        <button id="mainActionBtn" class="play-now-btn w-full py-4 text-xl" onclick="handleMatchmaking()">
          <span></span><span></span><span></span><span></span>
          <span id="mainBtnLabel">CREATE MATCH</span>
        </button>

        <!-- Secondary Option: Appear when color conflict exists -->
        <button id="followBtn" class="hidden text-[10px] text-gray-500 hover:text-cyan-400 transition-all uppercase tracking-[0.3em] cursor-pointer mt-4" onclick="pioneerNewRequest()">
          Host new match instead
        </button>
        
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="p-6 text-center text-gray-600 mt-auto text-[10px] tracking-[0.5em] uppercase border-t border-white/5 bg-black/20">
    ALPHA BUILD v1.0 // 
    <a href="mailto:later5143@gmail.com" class="hover:text-cyan-400 transition-colors">
      REPORT_GLITCH
    </a>
  </footer>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
