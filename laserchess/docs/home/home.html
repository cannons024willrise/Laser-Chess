<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess | Tactical Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --theme: #03e9f4; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .grid-cell { cursor: crosshair; transition: fill 0.2s; }
        .piece-group { transition: transform 0.3s cubic-bezier(0.17, 0.88, 0.32, 1.27); cursor: pointer; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-cyan-400">Tactical Gameplay</h2>
        <svg id="game-board" viewBox="0 0 1000 800" class="bg-black/80 border border-white/10 w-full rounded shadow-2xl"></svg>
    </div>

    <script>
        // 1. DATA & PHYSICS CONSTANTS
        const PIECE_INTERACTION_TABLE = {
            DEFLECTOR: {
                WEST:  { 2: { reflect: 'SOUTH', isDestroyed: false }, 3: { reflect: 'NORTH', isDestroyed: false } },
                NORTH: { 0: { reflect: 'EAST', isDestroyed: false }, 3: { reflect: 'WEST', isDestroyed: false } },
                EAST:  { 0: { reflect: 'NORTH', isDestroyed: false }, 1: { reflect: 'SOUTH', isDestroyed: false } },
                SOUTH: { 1: { reflect: 'EAST', isDestroyed: false }, 2: { reflect: 'WEST', isDestroyed: false } }
            }
        };

        let gameState = {
            pieces: [
                { type: "LASER", color: "blue", x: 0, y: 0, rot: 1 },
                { type: "DEFLECTOR", color: "blue", x: 2, y: 2, rot: 2 }
            ],
            selected: null
        };

        // 2. RAYCAST PHYSICS ENGINE
        function traceLaser() {
            const laser = gameState.pieces.find(p => p.type === 'LASER');
            if (!laser) return { pathStr: '', isDestroyed: false };

            let currentDir = ['NORTH', 'EAST', 'SOUTH', 'WEST'][laser.rot];
            let cx = laser.x, cy = laser.y;
            let points = [[cx * 100 + 50, cy * 100 + 50]];
            let isDestroyed = false;

            const DIRS = { NORTH: {dx:0, dy:-1}, EAST: {dx:1, dy:0}, SOUTH: {dx:0, dy:1}, WEST: {dx:-1, dy:0} };

            for (let step = 0; step < 15; step++) {
                let vec = DIRS[currentDir];
                cx += vec.dx; cy += vec.dy;
                points.push([cx * 100 + 50, cy * 100 + 50]);

                let hit = gameState.pieces.find(p => p.x === cx && p.y === cy);
                if (hit) {
                    if (hit.type === 'KING') { isDestroyed = true; break; }
                    let inbound = { NORTH:'SOUTH', SOUTH:'NORTH', EAST:'WEST', WEST:'EAST' }[currentDir];
                    let config = PIECE_INTERACTION_TABLE[hit.type]?.[inbound]?.[hit.rot];
                    if (!config || config.isDestroyed) { isDestroyed = true; break; }
                    if (!config.reflect) break;
                    currentDir = config.reflect;
                }
                if (cx < 0 || cx > 9 || cy < 0 || cy > 7) break;
            }
            return { pathStr: points.reduce((acc, p, i) => acc + (i === 0 ? `M ${p[0]} ${p[1]}` : ` L ${p[0]} ${p[1]}`), ''), isDestroyed };
        }

        // 3. RENDER ENGINE
        function renderBoard() {
            const svg = document.getElementById('game-board');
            const physics = traceLaser();
            svg.innerHTML = '';

            // Draw Path
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', physics.pathStr);
            path.setAttribute('stroke', physics.isDestroyed ? '#ef4444' : '#03e9f4');
            path.setAttribute('stroke-width', '8');
            path.setAttribute('fill', 'none');
            svg.appendChild(path);

            // Draw Pieces
            gameState.pieces.forEach(p => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'piece-group');
                g.style.transformOrigin = `${p.x * 100 + 50}px ${p.y * 100 + 50}px`;
                g.style.transform = `rotate(${p.rot * 90}deg)`;
                
                const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                img.setAttribute('href', `https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/pieces/${p.color}${p.type.toLowerCase()}.png`);
                img.setAttribute('x', p.x * 100 + 5);
                img.setAttribute('y', p.y * 100 + 5);
                img.setAttribute('width', 90); img.setAttribute('height', 90);
                
                g.appendChild(img);
                g.onclick = () => { p.rot = (p.rot + 1) % 4; renderBoard(); };
                svg.appendChild(g);
            });
        }

        renderBoard();
    </script>
</body>
</html>
