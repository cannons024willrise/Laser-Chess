<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="blue.css">

  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
</head>

<body class="min-h-screen flex flex-col">
  <header class="flex justify-between items-center p-4 bg-white shadow">
    <div class="flex items-center space-x-4">
      <h1 class="text-2xl font-bold">Laser Chess</h1>
    </div>
    <div>
      <a href="#" class="text-indigo-600" id="userEmail">Account</a>
      <a href="#" id="signOutBtn" class="ml-4 opacity-70 hover:opacity-100">Sign Out</a>
    </div>
  </header>

  <section class="p-4 bg-indigo-600 text-white text-center discord-banner">
    <a href="https://discord.gg/mbEuNMee" class="font-semibold tracking-widest uppercase text-sm">Join Our Discord Community</a>
  </section>

  <section class="flex flex-col items-center justify-center py-20 space-y-8 flex-grow">
    <h1 class="text-4xl md:text-5xl font-bold text-white tracking-widest text-center uppercase">
      Ready for your next battle, Strategist?
    </h1>

    <div class="flex items-center space-x-6">
      <span class="text-red-500 font-bold tracking-tighter uppercase">Red</span>
      <label class="switch">
        <input type="checkbox" id="sideToggle">
        <span class="slider"></span>
      </label>
      <span class="text-cyan-400 font-bold tracking-tighter uppercase">Blue</span>
    </div>

    <div id="requests" class="w-full max-w-md px-4 flex flex-col items-center space-y-6 mt-8">
      
      <div id="lobbyStatus" class="w-full p-6 bg-black/40 border border-cyan-400/30 backdrop-blur-sm text-center shadow-lg lobby-pulse">
        <p id="statusText" class="text-cyan-400 tracking-widest uppercase text-xs mb-2">
          Scanning Lobby...
        </p>
        <div id="oppPreview" class="text-white text-lg font-bold tracking-wider">
          STATUS: <span class="text-gray-500">IDLE</span>
        </div>
      </div>

      <div class="flex flex-col items-center w-full space-y-4">
        
        <button id="mainActionBtn" class="play-now-btn w-full" onclick="handleMatchmaking()">
          <span></span><span></span><span></span><span></span>
          CREATE MATCH
        </button>

        <button id="followBtn" class="hidden text-xs text-gray-500 hover:text-cyan-400 transition-colors uppercase tracking-widest cursor-pointer mt-4" onclick="pioneerNewRequest()">
          Host new match instead
        </button>
        
      </div>
    </div>
  </section>

  <footer class="p-4 text-center text-gray-500 mt-auto text-xs tracking-widest">
    ALPHA v1.0 <br />
    CONTACT: 
    <a href="mailto:later5143@gmail.com" class="text-indigo-600 hover:text-cyan-400 transition-colors">
      later5143@gmail.com
    </a>
  </footer>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
