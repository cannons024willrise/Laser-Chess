<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess | Lobby</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="themes.css">
  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
</head>

<body class="min-h-screen flex flex-col overflow-x-hidden">
  <main class="flex-grow flex flex-col justify-center items-center py-12 relative z-10 w-screen h-full overflow-hidden">
    
    <div class="text-center mt-4 mb-16 lg:mb-24 relative">
      <h1 class="text-6xl md:text-8xl lg:text-7xl font-black text-white tracking-[0.25em] uppercase italic drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">
        READY FOR BATTLE?
      </h1>
      <p class="text-gray-400 text-xs md:text-sm tracking-[0.8em] uppercase font-mono mt-6">Select parameters & enter queue</p>
    </div>

    <div class="w-full flex flex-col lg:flex-row items-center justify-between px-10 md:px-20 lg:px-40 gap-12 lg:gap-0">
      
      <div class="w-full lg:w-[450px] transform lg:-translate-x-32 transition-transform duration-500">
        <div id="lobbyStatus" class="rule-card relative p-16 text-center lobby-pulse">
          <div class="rule-card-accent"></div>
          <p id="statusText" class="text-theme tracking-[0.5em] uppercase text-xs mb-8 font-mono">SCANNING LOBBY...</p>
          <div id="oppPreview" class="text-white text-4xl lg:text-5xl font-black tracking-widest uppercase italic leading-tight">
            STATUS: <br>
            <span id="statusValue" class="text-gray-500 block mt-3 font-mono text-3xl">IDLE</span>
          </div>
        </div>
      </div>

      <div class="w-full lg:w-[500px] transform lg:translate-x-32 transition-transform duration-500">
        <div class="rule-card relative p-10 lg:p-14 flex flex-col items-center space-y-12">
          <div class="rule-card-accent"></div>
          
          <div class="w-full text-center">
            <p class="text-[30px] text-gray-500 font-mono tracking-[0.4em] mb-6 border-b border-white/10 pb-2 uppercase">SELECT FACTION</p>
            <div class="flex items-center justify-center space-x-12 scale-110">
              <span class="text-[#f44336] font-black tracking-[0.2em] uppercase text-2xl">RED</span>
              <label class="switch">
                <input type="checkbox" id="sideToggle">
                <span class="slider"></span>
              </label>
              <span class="text-[#03e9f4] font-black tracking-[0.2em] uppercase text-2xl">BLUE</span>
            </div>
          </div>

          <div class="w-full max-w-md mx-auto pt-8">
            <button id="mainActionBtn" class="play-now-btn">
              <span></span><span></span><span></span><span></span>
              <span id="mainBtnLabel">CREATE MATCH</span>
            </button>
          </div>
        </div>
      </div>

    </div>
    <div class="h-32 lg:h-40"></div>
  </main>

  </body>
</html>
