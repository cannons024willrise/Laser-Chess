<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laser Chess | Lobby</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
  <link rel="stylesheet" href="themes.css">

  <style>
    body {
      font-family: "Quantico", sans-serif;
    }
  </style>

  <script type="module" src="homeauthcheck.js"></script>
  <script type="module" src="lobby.js"></script>
  <script type="module" src="./tutorials.js"></script>
</head>

<body class="min-h-screen w-full flex flex-col m-0 p-0 text-white">
  
  <header class="flex justify-between items-center p-4 z-20 relative shadow-[0_10px_30px_rgba(0,0,0,0.8)] w-full box-border">
    <div class="flex items-center space-x-4">
      <h1 class="text-2xl font-black tracking-tighter italic drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">LASER CHESS</h1>
    </div>
  </header>

  <section class="w-full py-2 bg-theme-10 border-b border-theme-20 text-center z-10 box-border">
    <a href="https://discord.gg/mbEuNMee" class="text-[11px] font-bold tracking-[0.5em] uppercase text-theme hover:text-white transition-colors">
      Join our Discord community
    </a>
  </section>

  <section id="the-rules" class="relative z-10 w-full bg-black/60 backdrop-blur-sm border-t border-theme-20 py-32 px-10 md:px-20 lg:px-40 shadow-[0_-30px_80px_rgba(0,0,0,0.9)] overflow-hidden box-border">
    </section>

  <main class="flex-grow flex flex-col justify-center items-center py-20 relative z-10 w-full overflow-hidden box-border">
  
    <div class="text-center mt-4 mb-12 relative select-none">
      <h1 class="text-6xl md:text-8xl lg:text-7xl font-black tracking-[0.25em] uppercase italic drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]">
        Ready to play?
      </h1>
      <div class="flex items-center justify-center space-x-4 mt-6 opacity-80">
        <div class="w-12 h-px bg-gray-600"></div>
        <p class="text-gray-400 text-sm tracking-[0.8em] uppercase font-mono">
          Choose a mode and start playing
        </p>
        <div class="w-12 h-px bg-gray-600"></div>
      </div>
    </div>

    <div class="w-full max-w-[580px] flex flex-col space-y-6 px-6 relative z-20 box-border">
      <button id="btnLocalPlay" 
              onclick="window.location.href='https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/Game_Frontend/laser%20chess/laser%20chess.html'" 
              class="play-now-btn group">
        <span></span><span></span><span></span><span></span>
        <div id="mainBtnLabel" class="w-full flex items-center justify-between px-8">
          <div>01 // LOCAL MULTIPLAYER</div>
          <div class="font-mono text-2xl transition-transform duration-300 group-hover:translate-x-2">➔</div>
        </div>
      </button>
      <button id="btnAiMode" 
              onclick="window.location.href='https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/Game_Frontend/laser%20chess/laser%20chess.html'" 
              class="play-now-btn group">
        <span></span><span></span><span></span><span></span>
        <div id="mainBtnLabel" class="w-full flex items-center justify-between px-8">
          <div>02 // PLAY AGAINST AI</div>
          <div class="font-mono text-2xl transition-transform duration-300 group-hover:translate-x-2">➔</div>
        </div>
      </button>
      <button id="btnOnlineMatch" class="play-now-btn group">
        <span></span><span></span><span></span><span></span>
        <div id="mainBtnLabel" class="w-full flex items-center justify-between px-8">
          <div>03 // PLAY ONLINE</div>
          <div class="font-mono text-2xl transition-transform duration-300 group-hover:translate-x-2">➔</div>
        </div>
      </button>
    </div>
  </main>

  <footer class="fixed bottom-0 left-0 w-full p-4 text-center text-gray-600 text-[11px] tracking-[0.6em] uppercase border-t border-white/5 bg-black/90 backdrop-blur-md z-50 box-border">
    <div class="flex justify-center items-center space-x-6">
      <span>Beta build v1.0</span>
      <span class="text-theme">///</span>
      <a href="mailto:later5143@gmail.com" class="hover-text-theme transition-colors font-mono">
        Report a bug // suggest an idea
      </a>
    </div>
  </footer>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
