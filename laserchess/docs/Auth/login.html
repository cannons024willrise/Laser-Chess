<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Login to Laser Chess</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style id="theme1" disabled>
        @font-face { font-family: customfont; src: url(c.otf); }
        html { height: 100%; }
        body { margin: 0; padding: 0; font-family: customfont; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("Gemini_Generated_Image_atb53oatb53oatb5.png") no-repeat center center fixed; background-size: 100% 100%; }
        .login-box { position: absolute; top: 50%; left: 50%; width: 700px; padding: 40px; transform: translate(-50%, -50%); background: rgba(0,0,0,.5); box-sizing: border-box; box-shadow: 0 15px 25px rgba(0,0,0,.6); border-radius: 10px; }
        .login-box h2 { margin: 0 0 30px; padding: 0; color: #fff; text-align: center; }
        .login-box .user-box { position: relative; }
        .login-box .user-box input { width: 100%; padding: 10px 0; font-size: 16px; color: #fff; margin-bottom: 30px; border: none; border-bottom: 1px solid #fff; outline: none; background: transparent; text-align: center; }
        .login-box .user-box label { position: absolute; top: 0; left: 0; width: 100%; text-align: center; padding: 10px 0; font-size: 16px; color: #fff; pointer-events: none; transition: .5s; }
        .login-box .user-box input:focus ~ label, .login-box .user-box input:valid ~ label { top: -20px; left: 0; color: #f44336; font-size: 12px; }
        .login-box form a { position: relative; display: inline-block; padding: 10px 20px; color: #f44336; font-size: 16px; text-decoration: none; text-transform: uppercase; overflow: hidden; transition: .5s; margin-top: 40px; letter-spacing: 4px; }
        .login-box a:hover { background: #f44336; color: #fff; border-radius: 5px; box-shadow: 0 0 5px #f44336, 0 0 25px #f44336, 0 0 50px #f44336, 0 0 100px #f44336; }
        .login-box a span { position: absolute; display: block; }
        .login-box a span:nth-child(1) { top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #f44336); animation: btn-anim1 1s linear infinite; }
        .login-box a span:nth-child(2) { top: -100%; right: 0; width: 2px; height: 100%; background: linear-gradient(180deg, transparent, #f44336); animation: btn-anim2 1s linear infinite; animation-delay: .25s; }
        .login-box a span:nth-child(3) { bottom: 0; right: -100%; width: 100%; height: 2px; background: linear-gradient(270deg, transparent, #f44336); animation: btn-anim3 1s linear infinite; animation-delay: .5s; }
        .login-box a span:nth-child(4) { bottom: -100%; left: 0; width: 2px; height: 100%; background: linear-gradient(360deg, transparent, #f44336); animation: btn-anim4 1s linear infinite; animation-delay: .75s; }
        @keyframes btn-anim1 { 0% { left: -100%; } 50%,100% { left: 100%; } }
        @keyframes btn-anim2 { 0% { top: -100%; } 50%,100% { top: 100%; } }
        @keyframes btn-anim3 { 0% { right: -100%; } 50%,100% { right: 100%; } }
        @keyframes btn-anim4 { 0% { bottom: -100%; } 50%,100% { bottom: 100%; } }
    </style>

    <style id="theme2" disabled>
        @font-face { font-family: customfont; src: url(c.otf); }
        html { height: 100%; }
        body { margin: 0; padding: 0; font-family: customfont; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("Gemini_Generated_Image_tjcevutjcevutjce.png") no-repeat center center fixed; background-size: 100% 100%; }
        .login-box { position: absolute; top: 50%; left: 50%; width: 700px; padding: 40px; transform: translate(-50%, -50%); background: rgba(0,0,0,.5); box-sizing: border-box; box-shadow: 0 15px 25px rgba(0,0,0,.6); border-radius: 10px; }
        .login-box h2 { margin: 0 0 30px; padding: 0; color: #fff; text-align: center; }
        .login-box .user-box { position: relative; }
        .login-box .user-box input { width: 100%; padding: 10px 0; font-size: 16px; color: #fff; margin-bottom: 30px; border: none; border-bottom: 1px solid #fff; outline: none; background: transparent; text-align: center; }
        .login-box .user-box label { position: absolute; top: 0; left: 0; width: 100%; text-align: center; padding: 10px 0; font-size: 16px; color: #fff; pointer-events: none; transition: .5s; }
        .login-box .user-box input:focus ~ label, .login-box .user-box input:valid ~ label { top: -20px; left: 0; color: #03e9f4; font-size: 12px; }
        .login-box form a { position: relative; display: inline-block; padding: 10px 20px; color: #03e9f4; font-size: 16px; text-decoration: none; text-transform: uppercase; overflow: hidden; transition: .5s; margin-top: 40px; letter-spacing: 4px; }
        .login-box a:hover { background: #03e9f4; color: #fff; border-radius: 5px; box-shadow: 0 0 5px #03e9f4, 0 0 25px #03e9f4, 0 0 50px #03e9f4, 0 0 100px #03e9f4; }
        .login-box a span { position: absolute; display: block; }
        .login-box a span:nth-child(1) { top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #03e9f4); animation: btn-anim1 1s linear infinite; }
        .login-box a span:nth-child(2) { top: -100%; right: 0; width: 2px; height: 100%; background: linear-gradient(180deg, transparent, #03e9f4); animation: btn-anim2 1s linear infinite; animation-delay: .25s; }
        .login-box a span:nth-child(3) { bottom: 0; right: -100%; width: 100%; height: 2px; background: linear-gradient(270deg, transparent, #03e9f4); animation: btn-anim3 1s linear infinite; animation-delay: .5s; }
        .login-box a span:nth-child(4) { bottom: -100%; left: 0; width: 2px; height: 100%; background: linear-gradient(360deg, transparent, #03e9f4); animation: btn-anim4 1s linear infinite; animation-delay: .75s; }
        @keyframes btn-anim1 { 0% { left: -100%; } 50%,100% { left: 100%; } }
        @keyframes btn-anim2 { 0% { top: -100%; } 50%,100% { top: 100%; } }
        @keyframes btn-anim3 { 0% { right: -100%; } 50%,100% { right: 100%; } }
        @keyframes btn-anim4 { 0% { bottom: -100%; } 50%,100% { bottom: 100%; } }
    </style>

    <style>
        .columns { display: flex; gap: 28px; align-items: flex-start; }
        #login-form { flex: 1 1 50%; display: flex; flex-direction: column; }
        .button-row { display: flex; gap: 12px; margin-top: 6px; align-items: center; justify-content: center; }
        .button-row a { flex: 1 1 100%; text-align: center; cursor: pointer; }
        .login-text { flex: 1 1 50%; }
        .login-text p { color: #fff; margin: 0; line-height: 1.45; font-size: 20px; }
        .error-msg { width: 100%; text-align: center; margin-top: 14px; word-wrap: break-word; color: #ff6b6b; }
        @media (max-width: 720px) {
            .login-box { width: 90vw; padding: 24px; }
            .columns { flex-direction: column; gap: 18px; }
            .login-text p { font-size: 13px; }
        }
    </style>

    <script>
        function randomizeTheme() {
            const randomTheme = Math.random() < 0.5 ? 'theme1' : 'theme2';
            document.getElementById('theme1').disabled = true;
            document.getElementById('theme2').disabled = true;
            document.getElementById(randomTheme).disabled = false;
        }
        window.onload = randomizeTheme;
    </script>
</head>

<body>
    <div class="login-box">
        <h2>SESSION ACCESS</h2>
        <div class="columns">
            <form id="login-form" onsubmit="return false;">
                <div class="user-box">
                    <br><br>
                    <input id="session-name" type="text" required maxlength="20" />
                    <label>Session Name</label>
                </div>
                <div class="user-box">
                    <br><br>
                    <input id="session-key" type="password" required maxlength="20" />
                    <label>Session Key</label>
                </div>
                <div class="button-row">
                    <a id="enterBtn"><span></span><span></span><span></span><span></span>Initialize</a>
                </div>
            </form>
            <div class="login-text">
                <p>
                    Multiplayer Laser Chess.<br><br>
                    No account required.<br><br>
                    Enter your session name and key to play.<br><br>
                </p>
            </div>
        </div>
        <div id="status" class="status-msg"></div>
        <div id="error-msg" class="error-msg"></div>
    </div>

    <script>
        document.getElementById("enterBtn").addEventListener("click", () => {
            const name = document.getElementById("session-name").value.trim();
            const key = document.getElementById("session-key").value.trim();
            const errorEl = document.getElementById("error-msg");

            if (name && key) {
                // High persistence local storage
                localStorage.setItem("lc_session_name", name);
                localStorage.setItem("lc_key", key);

                // Direct jump to the session path
                window.location.replace("/laserchess/docs/home/home.html");
            } else {
                errorEl.textContent = "Both Name and Key (max 20 chars) are required.";
            }
        });
    </script>
</body>
</html>
