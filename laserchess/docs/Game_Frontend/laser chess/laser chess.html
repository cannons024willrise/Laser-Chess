<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess | Tactical Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --theme-color: #03e9f4;
            --theme-rgb: 3, 233, 244;
            --red-theme: #f44336;
        }
        body { font-family: "Quantico", sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
        .rule-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .play-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(3, 233, 244, 0.3); color: var(--theme-color); transition: all 0.3s; font-weight: bold; text-transform: uppercase; }
        .play-btn:hover { background: rgba(var(--theme-rgb), 0.2); box-shadow: 0 0 10px var(--theme-color); }
        .play-btn:active { transform: scale(0.98); }
        .grid-cell { transition: fill 0.2s; cursor: pointer; }
        .grid-cell.selected { fill: rgba(3, 233, 244, 0.2); stroke: var(--theme-color); stroke-width: 3; }
        .grid-cell.reserved-blue { fill: rgba(3, 233, 244, 0.05); }
        .grid-cell.reserved-red { fill: rgba(244, 67, 54, 0.05); }
        .piece-group { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        #sys-log div { margin-bottom: 4px; }
    </style>
</head>
<body class="p-8 flex justify-center">

    <div class="flex gap-8 max-w-[1200px] w-full flex-col lg:flex-row">
        <div class="rule-card p-8 rounded-lg flex-grow relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#03e9f4] to-transparent opacity-80" id="turn-accent"></div>
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase tracking-widest">Tactical Grid</h2>
                <div id="turn-display" class="px-4 py-1 text-sm font-bold tracking-widest border border-cyan-400 text-cyan-400 bg-cyan-950/30">
                    TURN: BLUE
                </div>
            </div>
            <svg id="game-board" viewBox="0 0 1000 800" class="bg-black/50 border border-white/10 w-full select-none"></svg>
        </div>

        <div class="rule-card p-6 w-full lg:w-[350px] flex flex-col gap-4 shrink-0">
            <h3 class="text-cyan-400 font-bold uppercase tracking-widest">Controls</h3>
            <div id="selection-status" class="text-[10px] text-gray-500 uppercase font-mono mb-2 border-b border-white/10 pb-2">NO PIECE SELECTED</div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="rotateSelected(-1)" class="play-btn py-3 text-[11px]">Rotate Left ⟲</button>
                <button onclick="rotateSelected(1)" class="play-btn py-3 text-[11px]">Rotate Right ⟳</button>
            </div>
            
            <button onclick="skipTurnAndFire()" class="play-btn py-3 text-[11px] border-yellow-500 text-yellow-500 hover:shadow-[0_0_10px_rgba(234,179,8,0.5)] hover:bg-yellow-500/20">🔥 Fire (Skip Move)</button>
            <button onclick="clearSelection()" class="play-btn py-3 text-[11px] border-red-500 text-red-500 hover:shadow-[0_0_10px_rgba(244,67,54,0.5)] hover:bg-red-500/20">Deselect</button>
            
            <div class="flex-grow flex flex-col mt-4">
                <h3 class="text-gray-500 font-black tracking-widest uppercase text-xs mb-2">System Log</h3>
                <div id="sys-log" class="flex-grow bg-black/50 border border-white/5 p-3 text-[10px] font-mono overflow-y-auto h-[250px] flex flex-col justify-end"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE ASSETS & CONSTANTS ---
        const BASE_ASSET_URL = "https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/pieces";
        const CELL_SIZE = 100;
        
        // Fixed vectors to match visual SVG top-to-bottom matrix orientation 
        // (NORTH goes UP visually, meaning y gets smaller; SOUTH goes DOWN visually, meaning y gets larger)
        const DIRS_MAP = {
            'NORTH': { dx: 0, dy: -1 },
            'EAST':  { dx: 1, dy: 0 },
            'SOUTH': { dx: 0, dy: 1 },
            'WEST':  { dx: -1, dy: 0 }
        };
        const ROT_ARRAY = ['NORTH', 'EAST', 'SOUTH', 'WEST'];

        // Reserved zones scaled to pure visual 0-7 vertical configuration
        const BLUE_RESERVED = [{x:9,y:0},{x:9,y:1},{x:9,y:2},{x:9,y:3},{x:9,y:4},{x:9,y:5},{x:9,y:6},{x:9,y:7},{x:1,y:0},{x:1,y:7}];
        const RED_RESERVED = [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:0,y:4},{x:0,y:5},{x:0,y:6},{x:0,y:7},{x:8,y:0},{x:8,y:7}];

        // Absolute verification maps from tutorials.js
        const PIECE_INTERACTION_TABLE = {
            KING: {
                NORTH: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } },
                EAST:  { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } },
                SOUTH: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } },
                WEST:  { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }
            },
            DEFENDER: {
                NORTH: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: true } },
                EAST:  { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: false } },
                SOUTH: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } },
                WEST:  { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }
            },
            DEFLECTOR: {
                WEST:  { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: 'SOUTH', isDestroyed: false }, 3: { reflect: 'NORTH', isDestroyed: false } },
                NORTH: { 0: { reflect: 'EAST', isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: 'WEST', isDestroyed: false } },
                EAST:  { 0: { reflect: 'NORTH', isDestroyed: false }, 1: { reflect: 'SOUTH', isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } },
                SOUTH: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: 'EAST', isDestroyed: false }, 2: { reflect: 'WEST', isDestroyed: false }, 3: { reflect: null, isDestroyed: true } }
            },
            SWITCH: {
                NORTH: { 0: { reflect: 'WEST', isDestroyed: false }, 1: { reflect: 'SOUTH', isDestroyed: false }, 2: { reflect: 'EAST', isDestroyed: false }, 3: { reflect: 'NORTH', isDestroyed: false } },
                EAST:  { 0: { reflect: 'EAST', isDestroyed: false }, 1: { reflect: 'NORTH', isDestroyed: false }, 2: { reflect: 'WEST', isDestroyed: false }, 3: { reflect: 'SOUTH', isDestroyed: false } },
                SOUTH: { 0: { reflect: 'WEST', isDestroyed: false }, 1: { reflect: 'SOUTH', isDestroyed: false }, 2: { reflect: 'EAST', isDestroyed: false }, 3: { reflect: 'NORTH', isDestroyed: false } },
                WEST:  { 0: { reflect: 'EAST', isDestroyed: false }, 1: { reflect: 'NORTH', isDestroyed: false }, 2: { reflect: 'WEST', isDestroyed: false }, 3: { reflect: 'SOUTH', isDestroyed: false } }
            }
        };

        // --- 2. INITIAL GAME STATE (CORRECT UNIFIED Y-AXIS FORMAT) ---
        let gameState = {
            turn: 'BLUE', 
            status: 'ACTIVE',
            selected: null,
            laserPath: null,
            pieces: [
                {id: 1, pieceType: "KING", color: "BLUE", rot: 2, x: 4, y: 7},
                {id: 2, pieceType: "KING", color: "RED", rot: 0, x: 5, y: 0},
                {id: 3, pieceType: "DEFENDER", color: "RED", rot: 2, x: 4, y: 0},
                {id: 4, pieceType: "DEFENDER", color: "RED", rot: 2, x: 6, y: 0},
                {id: 5, pieceType: "DEFENDER", color: "BLUE", rot: 0, x: 5, y: 7},
                {id: 6, pieceType: "DEFENDER", color: "BLUE", rot: 0, x: 3, y: 7},
                {id: 7, pieceType: "SWITCH", color: "BLUE", rot: 0, x: 5, y: 4},
                {id: 8, pieceType: "SWITCH", color: "BLUE", rot: 1, x: 4, y: 4},
                {id: 9, pieceType: "SWITCH", color: "RED", rot: 0, x: 4, y: 3},
                {id: 10, pieceType: "SWITCH", color: "RED", rot: 1, x: 5, y: 3},
                {id: 11, pieceType: "LASER", color: "RED", rot: 2, x: 0, y: 0},
                {id: 12, pieceType: "DEFLECTOR", color: "BLUE", rot: 0, x: 2, y: 7},
                {id: 13, pieceType: "DEFLECTOR", color: "BLUE", rot: 0, x: 2, y: 4},
                {id: 14, pieceType: "DEFLECTOR", color: "BLUE", rot: 1, x: 2, y: 3},
                {id: 15, pieceType: "DEFLECTOR", color: "RED", rot: 2, x: 0, y: 4},
                {id: 16, pieceType: "DEFLECTOR", color: "RED", rot: 3, x: 0, y: 3},
                {id: 17, pieceType: "DEFLECTOR", color: "BLUE", rot: 3, x: 7, y: 6},
                {id: 18, pieceType: "DEFLECTOR", color: "RED", rot: 2, x: 6, y: 5},
                {id: 19, pieceType: "DEFLECTOR", color: "RED", rot: 2, x: 7, y: 3},
                {id: 20, pieceType: "DEFLECTOR", color: "RED", rot: 3, x: 7, y: 4},
                {id: 21, pieceType: "DEFLECTOR", color: "BLUE", rot: 1, x: 9, y: 4},
                {id: 22, pieceType: "DEFLECTOR", color: "BLUE", rot: 0, x: 9, y: 3},
                {id: 23, pieceType: "DEFLECTOR", color: "BLUE", rot: 0, x: 3, y: 2},
                {id: 24, pieceType: "DEFLECTOR", color: "RED", rot: 1, x: 2, y: 1},
                {id: 25, pieceType: "DEFLECTOR", color: "RED", rot: 2, x: 7, y: 0},
                {id: 26, pieceType: "LASER", color: "BLUE", rot: 0, x: 9, y: 7}
            ]
        };

        // --- 3. UI CONSOLE LOGGER ---
        function log(msg, color = 'text-gray-400') {
            const l = document.getElementById('sys-log');
            l.innerHTML += `<div class="${color}">> ${msg}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        function getPieceAt(x, y) { return gameState.pieces.find(p => p.x === x && p.y === y); }
        function inBounds(x, y) { return x >= 0 && x <= 9 && y >= 0 && y <= 7; }
        
        function isReservedSquare(x, y, color) {
            if (color === 'BLUE') return RED_RESERVED.some(s => s.x === x && s.y === y);
            return BLUE_RESERVED.some(s => s.x === x && s.y === y);
        }

        function updateTurnUI() {
            const td = document.getElementById('turn-display');
            const accent = document.getElementById('turn-accent');
            td.innerText = `TURN: ${gameState.turn}`;
            if (gameState.turn === 'RED') {
                td.className = 'px-4 py-1 text-sm font-bold tracking-widest border border-red-500 text-red-500 bg-red-950/30';
                accent.className = 'absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#f44336] to-transparent opacity-80';
            } else {
                td.className = 'px-4 py-1 text-sm font-bold tracking-widest border border-cyan-400 text-cyan-400 bg-cyan-950/30';
                accent.className = 'absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#03e9f4] to-transparent opacity-80';
            }
        }

        // --- 4. UNIFIED RAYCAST ENGINE ---
        function traceLaserEngine() {
            const laser = gameState.pieces.find(p => p.pieceType === 'LASER' && p.color === gameState.turn);
            if (!laser) return { pathStr: '', isDestroyed: false, hitPiece: null };

            let currentDir = ROT_ARRAY[laser.rot];
            let cx = laser.x;
            let cy = laser.y;
            
            let points = [[cx * CELL_SIZE + 50, cy * CELL_SIZE + 50]];
            let isDestroyed = false;
            let hitPiece = null;
            let seen = new Set();

            for (let step = 0; step < 40; step++) {
                let vec = DIRS_MAP[currentDir];
                cx += vec.dx; cy += vec.dy;

                if (!inBounds(cx, cy)) {
                    // Path hit out-of-bounds wall cleanly, draw final tip and stop
                    points.push([cx * CELL_SIZE + 50, cy * CELL_SIZE + 50]);
                    break;
                }

                points.push([cx * CELL_SIZE + 50, cy * CELL_SIZE + 50]);

                let stateKey = `${cx},${cy},${currentDir}`;
                if (seen.has(stateKey)) break;
                seen.add(stateKey);

                let hit = getPieceAt(cx, cy);
                if (hit) {
                    if (hit.pieceType === 'LASER') { break; } // Stopped right at weapon origin housing block
                    
                    let inboundDir = { 'NORTH':'SOUTH', 'SOUTH':'NORTH', 'EAST':'WEST', 'WEST':'EAST' }[currentDir];
                    let config = PIECE_INTERACTION_TABLE[hit.pieceType]?.[inboundDir]?.[ROT_ARRAY[hit.rot]];
                    
                    if (!config || config.isDestroyed) { 
                        isDestroyed = true; 
                        hitPiece = hit; 
                        break; 
                    }
                    if (!config.reflect) break; // Trapped safely inside armor grouping (Defender Block)
                    currentDir = config.reflect;
                }
            }
            
            const pathStr = points.reduce((acc, p, i) => acc + (i === 0 ? `M ${p[0]} ${p[1]}` : ` L ${p[0]} ${p[1]}`), '');
            return { pathStr, isDestroyed, hitPiece };
        }

        // --- 5. SEQUENTIAL GAMEPLAY CONTROL ---
        function executeFireSequence() {
            gameState.selected = null;
            document.getElementById('selection-status').innerText = "NO PIECE SELECTED";

            const trace = traceLaserEngine();
            gameState.laserPath = trace;
            renderBoard();

            setTimeout(() => {
                if (trace && trace.isDestroyed && trace.hitPiece) {
                    log(`Laser scorched ${trace.hitPiece.color} ${trace.hitPiece.pieceType} at (${trace.hitPiece.x}, ${trace.hitPiece.y})`, 'text-red-500 font-bold');
                    gameState.pieces = gameState.pieces.filter(p => p.id !== trace.hitPiece.id);
                    
                    if (trace.hitPiece.pieceType === 'KING') {
                        const winner = trace.hitPiece.color === 'RED' ? 'BLUE' : 'RED';
                        gameState.status = `${winner}_WIN`;
                        alert(`GAME OVER! ${winner} WINS!`);
                        log(`CRITICAL CRASH: ${winner} CAPTURED VICTORY OBJECTIVE.`, 'text-yellow-400 font-bold');
                        renderBoard();
                        return;
                    }
                }

                if (gameState.status === 'ACTIVE') {
                    gameState.turn = gameState.turn === 'RED' ? 'BLUE' : 'RED';
                    gameState.laserPath = null;
                    updateTurnUI();
                    log(`Control systems initialized for ${gameState.turn}.`, 'text-white');
                    renderBoard();
                }
            }, 1200);
        }

        // --- 6. PLAYER SELECTION & ACTION HANDLERS ---
        window.handleCellClick = (x, y) => {
            if (gameState.status !== 'ACTIVE') return;
            const clickedPiece = getPieceAt(x, y);

            if (gameState.selected) {
                const sx = gameState.selected.x;
                const sy = gameState.selected.y;
                const dx = Math.abs(x - sx);
                const dy = Math.abs(y - sy);

                if (dx === 0 && dy === 0) {
                    clearSelection();
                    return;
                }
                
                if (dx <= 1 && dy <= 1) {
                    const movingPiece = getPieceAt(sx, sy);
                    
                    if (movingPiece.pieceType === 'LASER') {
                        log(`[!] Systems Error: Laser structure anchor points cannot move.`, 'text-red-400');
                        clearSelection();
                        return;
                    }
                    if (isReservedSquare(x, y, movingPiece.color)) {
                        log(`[!] Boundary Error: Access to territory denied.`, 'text-red-400');
                        clearSelection();
                        return;
                    }

                    if (clickedPiece) {
                        // Switch swapping mechanism
                        if (movingPiece.pieceType === 'SWITCH' && (clickedPiece.pieceType === 'DEFLECTOR' || clickedPiece.pieceType === 'DEFENDER')) {
                            if (isReservedSquare(sx, sy, clickedPiece.color)) {
                                log(`[!] Swap Conflict: Cannot move enemy into protected matrix.`, 'text-red-400');
                                clearSelection();
                                return;
                            }
                            clickedPiece.x = sx; clickedPiece.y = sy;
                            movingPiece.x = x; movingPiece.y = y;
                            log(`Displaced ${clickedPiece.color} ${clickedPiece.pieceType} using Switch displacement.`, 'text-theme');
                            executeFireSequence();
                        } else {
                            log(`[!] Target sector fully occupied.`, 'text-red-400');
                            clearSelection();
                        }
                    } else {
                        movingPiece.x = x; movingPiece.y = y;
                        log(`Relocated ${movingPiece.pieceType} to grid node (${x}, ${y}).`, 'text-theme');
                        executeFireSequence();
                    }
                } else {
                    log(`[!] Navigation Error: Range vector exceeds limitations.`, 'text-red-400');
                }
            } 
            else if (clickedPiece) {
                if (clickedPiece.color !== gameState.turn) {
                    log(`[!] Command Error: Cannot interact with rival structures.`, 'text-red-400');
                    return;
                }
                gameState.selected = {x, y};
                document.getElementById('selection-status').innerText = `SELECTED: ${clickedPiece.color} ${clickedPiece.pieceType}`;
                renderBoard();
            }
        };

        window.rotateSelected = (dir) => {
            if (gameState.status !== 'ACTIVE' || !gameState.selected) return;
            const p = getPieceAt(gameState.selected.x, gameState.selected.y);
            
            if (p) {
                if (p.pieceType === 'KING') {
                    log(`[!] Command Error: Core structures cannot change alignment.`, 'text-red-400');
                    return;
                }

                const newRot = (p.rot + dir + 4) % 4;

                if (p.pieceType === 'LASER') {
                    if (p.color === 'BLUE' && (newRot === 1 || newRot === 2)) {
                        log(`[!] Calibration Failed: System safety limits manual alignment.`, 'text-red-400');
                        return;
                    }
                    if (p.color === 'RED' && (newRot === 0 || newRot === 3)) {
                        log(`[!] Calibration Failed: System safety limits manual alignment.`, 'text-red-400');
                        return;
                    }
                }

                p.rot = newRot;
                log(`Realigned ${p.pieceType} toward vector axis: ${ROT_ARRAY[p.rot]}.`, 'text-theme');
                executeFireSequence();
            }
        };

        window.skipTurnAndFire = () => {
            if (gameState.status !== 'ACTIVE') return;
            log(`Weapon terminal manual override initiated. Firing...`, 'text-yellow-400');
            executeFireSequence();
        };

        window.clearSelection = () => {
            gameState.selected = null;
            document.getElementById('selection-status').innerText = "NO PIECE SELECTED";
            renderBoard();
        };

        // --- 7. SVG RENDER ENGINE ---
        function renderBoard() {
            const svg = document.getElementById('game-board');
            svg.innerHTML = '';
            
            // Generate Grid Cells
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 10; x++) {
                    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    r.setAttribute('x', x * CELL_SIZE); 
                    r.setAttribute('y', y * CELL_SIZE);
                    r.setAttribute('width', CELL_SIZE); 
                    r.setAttribute('height', CELL_SIZE);
                    
                    let cls = 'grid-cell';
                    if (isReservedSquare(x, y, 'RED')) cls += ' reserved-blue';
                    else if (isReservedSquare(x, y, 'BLUE')) cls += ' reserved-red'; 

                    if (gameState.selected?.x === x && gameState.selected?.y === y) cls += ' selected';
                    
                    r.setAttribute('class', cls);
                    r.setAttribute('fill', 'transparent');
                    r.setAttribute('stroke', 'rgba(255,255,255,0.05)');
                    r.setAttribute('onclick', `handleCellClick(${x},${y})`);
                    svg.appendChild(r);
                }
            }

            // Draw Weapon Output Beam Paths
            if (gameState.laserPath) {
                const c = gameState.turn === 'RED' ? 'rgba(244, 67, 54,' : 'rgba(3, 233, 244,';
                const isD = gameState.laserPath.isDestroyed;
                
                const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                glow.setAttribute('d', gameState.laserPath.pathStr);
                glow.setAttribute('stroke', isD ? 'rgba(255, 0, 0, 0.4)' : `${c} 0.35)`);
                glow.setAttribute('stroke-width', '14'); glow.setAttribute('fill', 'none');
                
                const core = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                core.setAttribute('d', gameState.laserPath.pathStr);
                core.setAttribute('stroke', isD ? 'rgba(255, 100, 100, 0.9)' : 'white');
                core.setAttribute('stroke-width', '3.5'); core.setAttribute('fill', 'none');
                
                svg.appendChild(glow);
                svg.appendChild(core);
            }
            
            // Populate Functional Entities
            gameState.pieces.forEach(p => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'piece-group');
                
                const ox = p.x * CELL_SIZE + 50;
                const oy = p.y * CELL_SIZE + 50;
                
                g.style.transformOrigin = `${ox}px ${oy}px`;
                g.style.transform = `rotate(${p.rot * 90}deg)`;
                
                const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                img.setAttribute('x', p.x * CELL_SIZE + 5);
                img.setAttribute('y', p.y * CELL_SIZE + 5);
                img.setAttribute('width', 90); img.setAttribute('height', 90);
                img.setAttribute('href', `${BASE_ASSET_URL}/${p.color.toLowerCase()}${p.pieceType.toLowerCase()}.png`);
                
                g.appendChild(img);
                g.setAttribute('onclick', `handleCellClick(${p.x},${p.y})`);
                svg.appendChild(g);
            });
        }

        // Core execution sequence initializers
        log("Tactical Grid Core Engine Stabilized.", "text-cyan-400 font-bold");
        log("Pass and Play systems operating within nominal parameters.", "text-white");
        updateTurnUI();
        renderBoard();
    </script>
</body>
</html>
