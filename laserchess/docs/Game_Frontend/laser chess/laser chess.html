<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --theme-color:#03e9f4;
      --theme-rgb:3,233,244;
      --red-theme:#f44336;
      --bg0:#06080b;
      --bg1:#0d1116;
      --bg2:#121821;
      --panel:rgba(8,10,14,.82);
      --panel2:rgba(255,255,255,.03);
      --line:rgba(255,255,255,.08);
      --text:#e8f6ff;
      --muted:#97a8b6;
      --good:#24d18f;
      --warn:#ffb84d;
      --bad:#ff5f6f;
      --shadow:0 18px 60px rgba(0,0,0,.42);
      --boardW: min(78vw, 780px);
      --cell: calc(var(--boardW) / 10);
      --cellH: calc(var(--boardW) / 10);
      --blue-tint: rgba(3, 233, 244, 0.08);
      --red-tint: rgba(244, 67, 54, 0.08);
    }
    * { box-sizing: border-box; }
    
    /* UPDATED: Allow scrolling by using min-height and auto overflow */
    html, body { 
      min-height: 100%; 
      margin: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    body {
      font-family: "Quantico", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,.64), rgba(0,0,0,.8)),
        url('https://cannons024willrise.github.io/Laser-Chess/docs/home/Gemini_Generated_Image_tjcevutjcevutjce.png') center center / cover fixed no-repeat;
    }
    a { color: var(--theme-color); text-decoration: none; }
    
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }
    
    /* ... (Rest of your CSS remains the same) ... */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: rgba(5,7,10,.84);
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(1.3rem, 2vw, 2rem);
      letter-spacing: .16em;
      font-weight: 900;
      text-transform: uppercase;
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: .78rem;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: .7rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: .82rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .pill {
      padding: .5rem .8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .hero {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(3,233,244,.08), rgba(3,233,244,0));
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr .95fr;
      gap: 1rem;
      align-items: stretch;
      max-width: 1480px;
      margin: 0 auto;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .hero-left {
      padding: 1rem 1rem 1.1rem;
      display: grid;
      gap: .9rem;
    }
    .hero-left h2 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: .9;
      letter-spacing: -.06em;
      text-transform: uppercase;
      font-weight: 900;
    }
    .hero-left .sub {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: .78rem;
    }
    .hero-left .desc {
      color: #d9e9f5;
      line-height: 1.6;
      max-width: 62ch;
      font-size: .98rem;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }
    button, select {
      font-family: inherit;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: .85rem 1rem;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: .78rem;
      transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      user-select: none;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--theme-rgb), .35);
      box-shadow: 0 0 0 1px rgba(var(--theme-rgb), .18), 0 12px 28px rgba(0,0,0,.24);
    }
    .btn.primary {
      background: linear-gradient(180deg, rgba(var(--theme-rgb), .16), rgba(var(--theme-rgb), .06));
      border-color: rgba(var(--theme-rgb), .35);
      color: var(--theme-color);
    }
    .btn.danger {
      background: linear-gradient(180deg, rgba(244,67,54,.16), rgba(244,67,54,.06));
      border-color: rgba(244,67,54,.38);
      color: #ffb0a8;
    }
    .hero-right {
      padding: 1rem;
      display: grid;
      gap: .85rem;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .stat {
      padding: .9rem 1rem;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      min-height: 85px;
    }
    .stat .k {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .7rem;
      margin-bottom: .45rem;
    }
    .stat .v {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(540px, 1.25fr) minmax(320px, .75fr);
      gap: 1rem;
      max-width: 1480px;
      width: 100%;
      margin: 1rem auto 1.25rem;
      padding: 0 1.25rem 1.25rem;
      align-items: start;
    }
    .board-panel {
      padding: 1rem;
    }
    .board-wrap {
      width: 100%;
      display: grid;
      place-items: center;
    }
    .board-shell {
      width: 100%;
      max-width: 980px;
      padding: .65rem;
      border-radius: 24px;
      background: rgba(0,0,0,.34);
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }
    .board-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(var(--theme-rgb), .06), transparent 65%);
      pointer-events: none;
    }
    svg#board {
      width: 100%;
      height: auto;
      aspect-ratio: 10 / 8;
      display: block;
      background: linear-gradient(180deg, rgba(1,3,6,.9), rgba(10,12,15,.88));
      border-radius: 18px;
      touch-action: manipulation;
    }
    .sidebar {
      display: grid;
      gap: 1rem;
      position: sticky;
      top: 1rem;
    }
    .side-card {
      padding: 1rem;
    }
    .side-card h3 {
      margin: 0 0 .8rem;
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: .9rem;
    }
    .turn-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: .8rem;
    }
    .turn-badge {
      padding: .48rem .8rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .72rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
    }
    .turn-blue { color: var(--theme-color); border-color: rgba(var(--theme-rgb), .35); }
    .turn-red { color: #ff8f84; border-color: rgba(244,67,54,.35); }
    .help {
      color: var(--muted);
      line-height: 1.6;
      font-size: .92rem;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    .controls .btn {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
    .panel-list {
      display: grid;
      gap: .6rem;
    }
    .panel-line {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding: .85rem .9rem;
      display: flex;
      justify-content: space-between;
      gap: .8rem;
      align-items: center;
      font-size: .9rem;
    }
    .panel-line .label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: .7rem;
    }
    .legend {
      display: grid;
      gap: .55rem;
      font-size: .88rem;
      color: var(--muted);
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: .65rem;
    }
    .swatch {
      width: 1rem;
      height: 1rem;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 4px;
      flex: 0 0 auto;
    }
    .swatch.valid { background: rgba(36,209,143,.18); border-color: rgba(36,209,143,.45); }
    .swatch.selected { background: rgba(var(--theme-rgb), .18); border-color: rgba(var(--theme-rgb), .45); }
    .swatch.reserved-blue { background: rgba(3, 233, 244, 0.12); border-color: rgba(3, 233, 244, 0.26); }
    .swatch.reserved-red { background: rgba(244, 67, 54, 0.12); border-color: rgba(244, 67, 54, 0.26); }
    .swatch.laser { background: rgba(255, 246, 102, .22); border-color: rgba(255, 246, 102, .6); }
    .log {
      max-height: 220px;
      overflow: auto;
      display: grid;
      gap: .4rem;
      padding-right: .25rem;
    }
    .log-entry {
      padding: .72rem .8rem;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      line-height: 1.5;
      font-size: .9rem;
    }
    .log-entry.good { border-color: rgba(36,209,143,.32); color: #c2ffe4; }
    .log-entry.warn { border-color: rgba(255,184,77,.32); color: #fff0cf; }
    .log-entry.bad { border-color: rgba(255,95,111,.32); color: #ffd0d5; }
    .log-entry.muted { color: var(--muted); }
    .footer-note {
      max-width: 1480px;
      margin: 0 auto 1rem;
      padding: 0 1.25rem;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .12rem .42rem;
      border: 1px solid rgba(255,255,255,.12);
      border-bottom-width: 2px;
      border-radius: 6px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: .78em;
      letter-spacing: 0;
      text-transform: none;
      min-width: 1.7rem;
    }
    .mini {
      font-size: .78rem;
      line-height: 1.4;
      color: var(--muted);
    }
    .hidden { display: none !important; }

    @media (max-width: 1120px){
      .hero-grid, .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
      }
      :root { --boardW: min(96vw, 800px); }
    }
    @media (max-width: 720px){
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      .stat-grid, .controls {
        grid-template-columns: 1fr;
      }
      :root { --boardW: 96vw; }
      .hero-left h2 { font-size: 2.45rem; }
    }
  
    svg{display:block;width:min(100vw,100vh - 20px);max-width:100%;height:auto;}
    #board, .board, .game-board, svg[id*="board"], svg[id*="sandbox"]{
     width:min(96vw,96vh)!important;
     height:min(96vw,96vh)!important;
     max-width:100%;
     max-height:100%;
    }
  </style>
</head>
