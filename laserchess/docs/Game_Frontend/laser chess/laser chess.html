<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess - Tactical Interface</title>
    <style>
        /* Base Theme and Strict Viewport Constraints to Prevent Scrolling */
        :root {
            --bg-color: #080810;
            --panel-bg: #111424;
            --border-color: #222a45;
            --neon-blue: #00f0ff;
            --neon-red: #ff0055;
            --text-main: #e2e8f0;
            --text-dim: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Master Grid Layout to constrain everything to 100vh */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        /* Top Header Navigation Panel */
        header {
            height: 50px;
            min-height: 50px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-panel {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .turn-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
            transition: all 0.3s ease;
        }

        /* Responsive Main Workspace Split */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 100%;
            height: calc(100% - 60px); /* Account for header height + gaps */
            overflow: hidden;
        }

        /* Absolute Board Wrapper to ensure dynamic scaling to iframe boundaries */
        .board-container {
            flex: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        /* Responsive SVG Logic: Constrain to container size while preserving ratio */
        svg#laser-chess-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Right Hand Info and Logs Column */
        .sidebar {
            flex: 1;
            max-width: 320px;
            min-width: 240px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .control-box, .log-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .control-box {
            gap: 10px;
        }

        .log-box {
            flex: 1;
            overflow: hidden;
        }

        .panel-heading {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .log-stream {
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 5px;
        }

        .log-entry {
            border-left: 2px solid var(--border-color);
            padding-left: 6px;
            color: var(--text-main);
        }

        .log-entry.blue { border-color: var(--neon-blue); }
        .log-entry.red { border-color: var(--neon-red); }

        /* Action Buttons */
        .action-btn {
            background: #1e243a;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: #2b3352;
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .action-btn.fire {
            background: linear-gradient(135deg, #4c0519, #881337);
            border-color: var(--neon-red);
        }

        .action-btn.fire:hover {
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        /* SVG Internal Custom Styles */
        .grid-line {
            stroke: #1e2538;
            stroke-width: 1;
        }
        .cell-rect {
            fill: #0c0e17;
            transition: fill 0.2s ease;
            cursor: pointer;
        }
        .cell-rect:hover {
            fill: #161b2e;
        }
        .piece-element {
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .laser-beam {
            stroke: var(--neon-red);
            stroke-width: 3;
            stroke-linecap: round;
            filter: drop-shadow(0px 0px 4px var(--neon-red));
        }

        /* Adjust UI for extremely vertical spaces / narrow mobile iframes */
        @media (max-width: 768px) {
            .main-workspace {
                flex-direction: column;
            }
            .sidebar {
                max-width: 100%;
                min-width: 0;
                height: 180px;
            }
            .log-box {
                display: none; /* Hide log stream on tight screen setups to safeguard layout */
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Application Header Layout -->
        <header>
            <div class="game-title">LASER CHESS</div>
            <div class="status-panel">
                <div class="turn-indicator">
                    <div id="turn-dot" class="turn-dot"></div>
                    <span id="turn-text">Blue Turn</span>
                </div>
            </div>
        </header>

        <!-- Main Workspace Containing Responsive Board and Sidebar -->
        <div class="main-workspace">
            
            <!-- Dynamic Responsive Board Shell -->
            <div class="board-container">
                <!-- SVG utilizing viewBox allows flawless auto-scaling in iframes without scrolling -->
                <svg id="laser-chess-svg" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
                    <!-- Dynamic layers injected via script structure -->
                    <g id="grid-layer"></g>
                    <g id="laser-layer"></g>
                    <g id="pieces-layer"></g>
                </svg>
            </div>

            <!-- Panel Controls and System Monitoring Log -->
            <div class="sidebar">
                <div class="control-box">
                    <div class="panel-heading">Controls</div>
                    <button class="action-btn fire" onclick="GameEngine.fireLaser()">FIRE LASER</button>
                    <button class="action-btn" onclick="GameEngine.rotatePiece(-90)">ROTATE LEFT</button>
                    <button class="action-btn" onclick="GameEngine.rotatePiece(90)">ROTATE RIGHT</button>
                </div>
                
                <div class="log-box">
                    <div class="panel-heading">Match Stream</div>
                    <div id="log-stream" class="log-stream">
                        <div class="log-entry">System initialization complete. Ready for configuration.</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Core Javascript Integration & Interface Bridge Layer -->
    <script>
        // Game Layout Configuration Matrix
        const COLS = 10;
        const ROWS = 8;
        const CELL_SIZE = 100; // 1000px width by 800px height total scale target

        // Internal Game System Architecture Container
        const GameEngine = {
            state: {
                currentTurn: 'blue',
                selectedPiece: null,
                boardMatrix: Array(ROWS).fill(null).map(() => Array(COLS).fill(null))
            },

            init: function() {
                this.renderGrid();
                this.seedSamplePieces();
                this.updateUI();
                this.logEvent("Game Board fully operational. Viewport constrained.", "system");
            },

            renderGrid: function() {
                const gridLayer = document.getElementById('grid-layer');
                let gridHTML = '';

                for(let r = 0; r < ROWS; r++) {
                    for(let c = 0; c < COLS; c++) {
                        let x = c * CELL_SIZE;
                        let y = r * CELL_SIZE;
                        gridHTML += `
                            <rect class="cell-rect" x="${x}" y="${y}" width="${CELL_SIZE}" height="${CELL_SIZE}" 
                                  onclick="GameEngine.handleCellClick(${r}, ${c})" stroke="#1f2538" stroke-width="1"/>
                        `;
                    }
                }
                gridLayer.innerHTML = gridHTML;
            },

            seedSamplePieces: function() {
                // Temporary sample seeding array structure mapping pieces safely
                this.placePiece(0, 0, 'king', 'red', 0);
                this.placePiece(0, 9, 'laser', 'red', 90);
                this.placePiece(7, 9, 'king', 'blue', 180);
                this.placePiece(7, 0, 'laser', 'blue', 270);
                this.placePiece(4, 4, 'deflector', 'blue', 45);
            },

            placePiece: function(row, col, type, owner, rotation) {
                this.state.boardMatrix[row][col] = { type, owner, rotation };
                this.renderPieces();
            },

            renderPieces: function() {
                const piecesLayer = document.getElementById('pieces-layer');
                piecesLayer.innerHTML = '';

                for(let r = 0; r < ROWS; r++) {
                    for(let c = 0; c < COLS; c++) {
                        const item = this.state.boardMatrix[r][c];
                        if(item) {
                            let cx = (c * CELL_SIZE) + (CELL_SIZE / 2);
                            let cy = (r * CELL_SIZE) + (CELL_SIZE / 2);
                            let color = item.owner === 'blue' ? 'var(--neon-blue)' : 'var(--neon-red)';
                            
                            // Visual representation builder logic for complex SVG pieces
                            let pieceSVG = '';
                            if(item.type === 'king') {
                                pieceSVG = `<circle cx="${cx}" cy="${cy}" r="30" fill="none" stroke="${color}" stroke-width="4"/>
                                            <circle cx="${cx}" cy="${cy}" r="15" fill="${color}"/>`;
                            } else if (item.type === 'laser') {
                                pieceSVG = `<rect x="${cx-25}" y="${cy-25}" width="50" height="50" fill="none" stroke="${color}" stroke-width="4"/>
                                            <polygon points="${cx},${cy-20} ${cx-15},${cy+15} ${cx+15},${cy+15}" fill="${color}"/>`;
                            } else {
                                // Fallback representation for standard deflector angles
                                pieceSVG = `<polygon points="${cx-25},${cy+25} ${cx+25},${cy+25} ${cx+25},${cy-25}" fill="${color}" opacity="0.8"/>`;
                            }

                            const wrapper = document.createElementNS("http://www.w3.org/2000/svg", "g");
                            wrapper.setAttribute("class", "piece-element");
                            wrapper.setAttribute("transform", `rotate(${item.rotation}, ${cx}, ${cy})`);
                            wrapper.innerHTML = pieceSVG;
                            wrapper.onclick = (e) => {
                                e.stopPropagation();
                                GameEngine.handlePieceClick(r, c);
                            };
                            piecesLayer.appendChild(wrapper);
                        }
                    }
                }
            },

            handleCellClick: function(row, col) {
                this.logEvent(`Tile selected at: Row ${row}, Col ${col}`, "system");
                // Core move validation logic insertion route from index.html
            },

            handlePieceClick: function(row, col) {
                const piece = this.state.boardMatrix[row][col];
                this.state.selectedPiece = { row, col, ...piece };
                this.logEvent(`Selected ${piece.owner} ${piece.type}`, piece.owner);
            },

            rotatePiece: function(degrees) {
                if(!this.state.selectedPiece) {
                    this.logEvent("Error: Select a game piece first to perform actions.", "system");
                    return;
                }
                const { row, col } = this.state.selectedPiece;
                this.state.boardMatrix[row][col].rotation = (this.state.boardMatrix[row][col].rotation + degrees) % 360;
                this.renderPieces();
                this.logEvent(`Rotated piece ${degrees} degrees`, this.state.currentTurn);
                this.switchTurn();
            },

            fireLaser: function() {
                this.logEvent(`Laser discharged by ${this.state.currentTurn} matrix terminal.`, this.state.currentTurn);
                
                // Simple hardcoded path showcase line for demo scalability
                const laserLayer = document.getElementById('laser-layer');
                laserLayer.innerHTML = `<line x1="50" y1="750" x2="450" y2="450" class="laser-beam" />
                                        <line x1="450" y1="450" x2="450" y2="50" class="laser-beam" />`;
                
                setTimeout(() => { laserLayer.innerHTML = ''; }, 1200);
                this.switchTurn();
            },

            switchTurn: function() {
                this.state.currentTurn = this.state.currentTurn === 'blue' ? 'red' : 'blue';
                this.updateUI();
            },

            updateUI: function() {
                const dot = document.getElementById('turn-dot');
                const text = document.getElementById('turn-text');
                
                if(this.state.currentTurn === 'blue') {
                    dot.style.backgroundColor = 'var(--neon-blue)';
                    dot.style.boxShadow = '0 0 10px var(--neon-blue)';
                    text.innerText = 'Blue Turn';
                } else {
                    dot.style.backgroundColor = 'var(--neon-red)';
                    dot.style.boxShadow = '0 0 10px var(--neon-red)';
                    text.innerText = 'Red Turn';
                }
            },

            logEvent: function(message, type) {
                const logStream = document.getElementById('log-stream');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type || ''}`;
                entry.innerText = `> ${message}`;
                logStream.appendChild(entry);
                logStream.scrollTop = logStream.scrollHeight;
            }
        };

        // Fire Initialization on load window attachment
        window.onload = () => { GameEngine.init(); };
    </script>
</body>
</html>
