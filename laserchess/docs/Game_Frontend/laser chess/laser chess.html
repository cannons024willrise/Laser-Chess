<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess | Tactical Local Pass & Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --theme-color: #03e9f4;
            --theme-rgb: 3, 233, 244;
            --red-theme: #f44336;
        }
        body { font-family: "Quantico", sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
        .rule-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .play-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(3, 233, 244, 0.3); color: var(--theme-color); transition: all 0.3s; }
        .play-btn:hover { background: rgba(var(--theme-rgb), 0.2); box-shadow: 0 0 10px var(--theme-color); }
        .grid-cell { transition: fill 0.2s; cursor: pointer; }
        .grid-cell.selected { fill: rgba(3, 233, 244, 0.15); stroke: var(--theme-color); stroke-width: 3; }
        .piece-group { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
    </style>
</head>
<body class="p-8 flex justify-center">

    <div class="flex gap-8 max-w-[1300px] w-full">
        <div class="rule-card p-8 rounded-lg flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase tracking-widest">Tactical Local Grid</h2>
                <div id="turn-indicator" class="px-4 py-2 border rounded font-bold tracking-widest text-cyan-400 border-cyan-400">
                    TURN: BLUE
                </div>
            </div>
            <svg id="game-board" viewBox="0 0 1000 800" class="bg-black/50 border border-white/10 w-full rounded"></svg>
        </div>

        <div class="rule-card p-6 w-[320px] flex flex-col gap-4">
            <h3 class="text-cyan-400 font-bold uppercase tracking-widest">System Controls</h3>
            <div id="selection-status" class="text-[11px] text-gray-500 uppercase font-mono mb-2">NO PIECE SELECTED</div>
            
            <button onclick="rotateSelected(-1)" class="play-btn py-2 rounded font-bold">Rotate Left ⟲</button>
            <button onclick="rotateSelected(1)" class="play-btn py-2 rounded font-bold">Rotate Right ⟳</button>
            <button onclick="fireLaserSequence()" class="bg-red-900/40 border border-red-500 text-red-400 hover:bg-red-500 hover:text-white transition-all py-3 rounded font-bold tracking-wider uppercase shadow-lg">Fire Photonic Laser ⚡</button>
            <button onclick="clearSelection()" class="play-btn py-2 border-white/20 text-gray-400 rounded">Deselect</button>
            
            <div class="border-t border-white/10 pt-3">
                <span class="text-[11px] text-gray-400 font-mono block mb-1">REAL-TIME COMBAT LOG</span>
                <div id="sys-log" class="h-56 bg-black/70 border border-white/5 p-2 text-[11px] font-mono text-gray-400 overflow-y-auto rounded flex flex-col gap-1">
                    <div class="text-gray-500">> System diagnostics loaded. Local Pass & Play initialized.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_ASSET_URL = "https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/pieces";
        const CELL_SIZE = 100;
