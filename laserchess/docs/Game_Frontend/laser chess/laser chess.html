<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <style>
    :root{ --theme-color:#03e9f4; --red-theme:#f44336; --bg1:#0d1116; --text:#e8f6ff; --muted:#97a8b6; }
    body { background: #06080b; color: var(--text); font-family: sans-serif; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #121821; border: 1px solid #333; padding: 20px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; border-radius: 10px; }
    .matrix-select { background: #000; color: #fff; padding: 5px; width: 100%; border: 1px solid #444; }
    .btn { padding: 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; }
  </style>
</head>
<body>

<div id="rulesModal" class="modal-overlay">
  <div class="modal-content">
    <h3>Engine Configuration (JSON)</h3>
    <table id="engineTable" style="width:100%; border-collapse: collapse; font-size: 0.75rem;">
      <thead><tr><th>Piece</th><th>Vector</th><th>Rot 0</th><th>Rot 1</th><th>Rot 2</th><th>Rot 3</th></tr></thead>
      <tbody></tbody>
    </table>
    <div style="margin-top:20px;">
      <button class="btn" id="resetRulesBtn">Reset to Default JSON</button>
      <button class="btn" id="closeRulesBtn">Save & Close</button>
    </div>
  </div>
</div>

<script>
(() => {
  // 1. THE DEFAULT ENGINE CONFIGURATION (JSON)
  const DEFAULT_ENGINE_CONFIG = {
    "KING": { "0": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "1": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "2": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "3": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}},
    "DEFENDER": { "0": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": false}, "3": {"reflect": null, "isDestroyed": true}}, "1": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": false}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "2": {"0": {"reflect": null, "isDestroyed": false}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "3": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": false}}},
    "DEFLECTOR": { "0": {"0": {"reflect": 1, "isDestroyed": false}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": 2, "isDestroyed": false}}, "1": {"0": {"reflect": 3, "isDestroyed": false}, "1": {"reflect": 2, "isDestroyed": false}, "2": {"reflect": null, "isDestroyed": true}, "3": {"reflect": null, "isDestroyed": true}}, "2": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": 0, "isDestroyed": false}, "2": {"reflect": 3, "isDestroyed": false}, "3": {"reflect": null, "isDestroyed": true}}, "3": {"0": {"reflect": null, "isDestroyed": true}, "1": {"reflect": null, "isDestroyed": true}, "2": {"reflect": 1, "isDestroyed": false}, "3": {"reflect": 0, "isDestroyed": false}}},
    "SWITCH": { "0": {"0": {"reflect": 1, "isDestroyed": false}, "1": {"reflect": 0, "isDestroyed": false}, "2": {"reflect": 3, "isDestroyed": false}, "3": {"reflect": 2, "isDestroyed": false}}, "1": {"0": {"reflect": 3, "isDestroyed": false}, "1": {"reflect": 2, "isDestroyed": false}, "2": {"reflect": 1, "isDestroyed": false}, "3": {"reflect": 0, "isDestroyed": false}}, "2": {"0": {"reflect": 1, "isDestroyed": false}, "1": {"reflect": 0, "isDestroyed": false}, "2": {"reflect": 3, "isDestroyed": false}, "3": {"reflect": 2, "isDestroyed": false}}, "3": {"0": {"reflect": 3, "isDestroyed": false}, "1": {"reflect": 2, "isDestroyed": false}, "2": {"reflect": 1, "isDestroyed": false}, "3": {"reflect": 0, "isDestroyed": false}}}
  };

  // Load state or fallback to default
  let INTERACTION_MAP = JSON.parse(localStorage.getItem("laserchess_custom_rules")) || JSON.parse(JSON.stringify(DEFAULT_ENGINE_CONFIG));

  function saveConfig() {
    localStorage.setItem("laserchess_custom_rules", JSON.stringify(INTERACTION_MAP));
  }

  // Populate GUI
  function buildGUI() {
    const tbody = document.querySelector("#engineTable tbody");
    tbody.innerHTML = "";
    Object.keys(INTERACTION_MAP).forEach(piece => {
      [2,1,0,3].forEach((inDir, i) => { // N, E, S, W
        const tr = document.createElement("tr");
        if (i === 0) { const td = document.createElement("td"); td.rowSpan = 4; td.textContent = piece; tr.appendChild(td); }
        tr.appendChild(document.createElement("td")).textContent = inDir;
        for (let rot = 0; rot < 4; rot++) {
          const td = document.createElement("td");
          const sel = document.createElement("select");
          sel.className = "matrix-select";
          sel.innerHTML = `<option value="destroy">Destroy</option><option value="block">Block</option><option value="ref_0">Reflect S</option><option value="ref_1">Reflect E</option><option value="ref_2">Reflect N</option><option value="ref_3">Reflect W</option>`;
          
          // Logic to match selection
          sel.value = INTERACTION_MAP[piece][rot][inDir].isDestroyed ? "destroy" : 
                      (INTERACTION_MAP[piece][rot][inDir].reflect !== null ? "ref_" + INTERACTION_MAP[piece][rot][inDir].reflect : "block");
          
          sel.onchange = (e) => {
            const v = e.target.value;
            if(v === "destroy") INTERACTION_MAP[piece][rot][inDir] = {reflect: null, isDestroyed: true};
            else if(v === "block") INTERACTION_MAP[piece][rot][inDir] = {reflect: null, isDestroyed: false};
            else INTERACTION_MAP[piece][rot][inDir] = {reflect: parseInt(v.split('_')[1]), isDestroyed: false};
            saveConfig();
          };
          td.appendChild(sel); tr.appendChild(td);
        }
        tbody.appendChild(tr);
      });
    });
  }

  document.getElementById("closeRulesBtn").onclick = () => document.getElementById("rulesModal").classList.remove("active");
  document.getElementById("resetRulesBtn").onclick = () => {
    localStorage.removeItem("laserchess_custom_rules");
    INTERACTION_MAP = JSON.parse(JSON.stringify(DEFAULT_ENGINE_CONFIG));
    buildGUI();
  };
  
  // Open modal logic would go here
  document.getElementById("rulesModal").classList.add("active"); // Auto-open for demo
  buildGUI();
})();
</script>
</body>
</html>
