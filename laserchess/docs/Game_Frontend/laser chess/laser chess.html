<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess | Tactical Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --theme-color: #03e9f4;
            --theme-rgb: 3, 233, 244;
            --red-theme: #f44336;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: "Quantico", sans-serif; 
            background: #0a0a0a; 
            color: white; 
            min-height: 100vh; 
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        /* --- NATIVE LAYOUT REPLACE FOR TAILWIND --- */
        .main-wrapper {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }
            .controls-sidebar {
                width: 100% !important;
            }
        }

        .rule-card { 
            background: rgba(20, 20, 20, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            border-radius: 0.5rem;
        }
        
        .board-container {
            padding: 2rem;
            flex-grow: 1;
        }

        .controls-sidebar {
            padding: 1.5rem;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* --- INTERFACE TYPOGRAPHY & BUTTONS --- */
        .board-title {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
        }

        .sidebar-title {
            color: #22d3ee;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .status-text {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            font-family: monospace;
            margin-bottom: 0.5rem;
        }

        .play-btn { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(3, 233, 244, 0.3); 
            color: var(--theme-color); 
            transition: all 0.3s; 
            padding: 0.5rem 0;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
        }
        .play-btn:hover { 
            background: rgba(3, 233, 244, 0.2); 
            box-shadow: 0 0 10px var(--theme-color); 
        }
        
        .btn-deselect {
            border-color: #ef4444;
            color: #ef4444;
        }
        .btn-deselect:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 10px #ef4444;
        }

        .sys-log-box {
            height: 10rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem;
            font-size: 10px;
            font-family: monospace;
            color: #9ca3af;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- SVG GRID & PIECES --- */
        #game-board {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            height: auto;
            display: block;
        }
        .grid-cell { transition: fill 0.2s; cursor: pointer; }
        .grid-cell:hover { fill: rgba(255, 255, 255, 0.02); }
        .grid-cell.selected { fill: rgba(3, 233, 244, 0.2); stroke: var(--theme-color); stroke-width: 3; }
        .piece-group { cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="rule-card board-container">
            <h2 class="board-title">Tactical Grid</h2>
            <svg id="game-board" viewBox="0 0 1000 800"></svg>
        </div>

        <div class="rule-card controls-sidebar">
            <h3 class="sidebar-title">Controls</h3>
            <div id="selection-status" class="status-text">NO PIECE SELECTED</div>
            
            <button onclick="rotateSelected(-1)" class="play-btn">Rotate Left ⟲</button>
            <button onclick="rotateSelected(1)" class="play-btn">Rotate Right ⟳</button>
            <button onclick="clearSelection()" class="play-btn btn-deselect">Deselect</button>
            
            <div id="sys-log" class="sys-log-box"></div>
        </div>
    </div>

    <script>
        const BASE_ASSET_URL = "https://cannons024willrise.github.io/Laser-Chess/laserchess/docs/pieces";
        const CELL_SIZE = 100;
        let gameState = {
            selected: null,
            pieces: [
                { id: 1, type: "KING", color: "BLUE", rot: 0, x: 4, y: 7 },
                { id: 2, type: "KING", color: "RED", rot: 0, x: 5, y: 0 },
                { id: 3, type: "LASER", color: "RED", rot: 0, x: 0, y: 0 },
                { id: 4, type: "DEFLECTOR", color: "BLUE", rot: 2, x: 2, y: 4 }
            ]
        };

        function renderBoard() {
            const svg = document.getElementById('game-board');
            svg.innerHTML = '';
            
            // Draw Grid
            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 10; x++) {
                    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    r.setAttribute('x', x * CELL_SIZE); r.setAttribute('y', y * CELL_SIZE);
                    r.setAttribute('width', CELL_SIZE); r.setAttribute('height', CELL_SIZE);
                    r.setAttribute('class', `grid-cell ${gameState.selected?.x === x && gameState.selected?.y === y ? 'selected' : ''}`);
                    r.setAttribute('fill', 'transparent');
                    r.setAttribute('stroke', 'rgba(255,255,255,0.05)');
                    r.setAttribute('onclick', `handleCellClick(${x},${y})`);
                    svg.appendChild(r);
                }
            }
            
            // Draw Pieces
            gameState.pieces.forEach(p => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'piece-group');
                
                // Calculate precise coordinates for rotation pivot anchor
                const centerX = p.x * CELL_SIZE + 50;
                const centerY = p.y * CELL_SIZE + 50;
                
                // FIXED: Use native SVG transform matrix rotation to handle cross-browser layout engines smoothly
                g.setAttribute('transform', `rotate(${p.rot * 90} ${centerX} ${centerY})`);
                
                const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                img.setAttribute('x', p.x * CELL_SIZE + 5);
                img.setAttribute('y', p.y * CELL_SIZE + 5);
                img.setAttribute('width', 90); img.setAttribute('height', 90);
                
                const imgUrl = `${BASE_ASSET_URL}/${p.color.toLowerCase()}${p.type.toLowerCase()}.png`;
                img.setAttribute('href', imgUrl);
                img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', imgUrl);
                
                g.appendChild(img);
                g.setAttribute('onclick', `handleCellClick(${p.x},${p.y})`);
                svg.appendChild(g);
            });
        }

        window.handleCellClick = (x, y) => {
            const clickedPiece = gameState.pieces.find(pc => pc.x === x && pc.y === y);

            // Movement Logic
            if (gameState.selected && !clickedPiece) {
                const sx = gameState.selected.x;
                const sy = gameState.selected.y;
                const dx = Math.abs(x - sx);
                const dy = Math.abs(y - sy);
                
                if (dx <= 1 && dy <= 1) {
                    const movingPiece = gameState.pieces.find(pc => pc.x === sx && pc.y === sy);
                    if (movingPiece.type === 'LASER') {
                        document.getElementById('sys-log').innerHTML += `> [!] Error: Lasers are fixed.<br>`;
                    } else {
                        movingPiece.x = x;
                        movingPiece.y = y;
                        gameState.selected = null;
                        document.getElementById('sys-log').innerHTML += `> Moved ${movingPiece.type} to (${x}, ${y})<br>`;
                    }
                } else {
                    document.getElementById('sys-log').innerHTML += `> [!] Invalid move range.<br>`;
                }
            } 
            // Selection Logic
            else if (clickedPiece) {
                gameState.selected = {x, y};
                document.getElementById('selection-status').innerText = `SELECTED: ${clickedPiece.color} ${clickedPiece.type}`;
            }
            renderBoard();
        };

        window.rotateSelected = (dir) => {
            if (!gameState.selected) return;
            const p = gameState.pieces.find(pc => pc.x === gameState.selected.x && pc.y === gameState.selected.y);
            if (p) {
                p.rot = (p.rot + dir + 4) % 4;
                document.getElementById('sys-log').innerHTML += `> Rotated ${p.type} to ${p.rot * 90}°<br>`;
            }
            renderBoard();
        };

        window.clearSelection = () => {
            gameState.selected = null;
            document.getElementById('selection-status').innerText = "NO PIECE SELECTED";
            renderBoard();
        };

        renderBoard();
    </script>
</body>
</html>
