<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <style>
    :root { --theme-color: #03e9f4; --red-theme: #f44336; }
    body { background: #06080b; color: #e8f6ff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #board { width: 800px; height: 640px; background: #0d1116; border: 1px solid #333; }
    @keyframes neonPulse { 0% { stroke-width: 12px; opacity: 0.5; } 50% { stroke-width: 28px; opacity: 1; } 100% { stroke-width: 12px; opacity: 0.5; } }
    @keyframes corePulse { 0% { stroke-width: 3px; opacity: 0.8; } 50% { stroke-width: 6px; opacity: 1; } 100% { stroke-width: 3px; opacity: 0.8; } }
  </style>
</head>
<body>

<svg id="board" viewBox="0 0 1000 800"></svg>

<script>
(() => {
  const W = 10, H = 8, CELL = 100;
  // State mock
  const state = {
    lastLaserPath: [{x: 0, y: 7}, {x: 5, y: 7}, {x: 5, y: 0}],
    lastLaserColor: "RED" 
  };

  function svgEl(name, attrs = {}) {
    const node = document.createElementNS("http://www.w3.org/2000/svg", name);
    for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, String(v));
    return node;
  }

  function render() {
    const svg = document.getElementById("board");
    svg.innerHTML = "";

    // Draw Laser
    if (state.lastLaserPath?.length > 0) {
      const pts = state.lastLaserPath.map(p => `${p.x * CELL + 50},${p.y * CELL + 50}`).join(" ");
      const beamColor = state.lastLaserColor === "RED" ? "#ff003c" : "#00f0ff";
      
      // AURA: Uses style.stroke to ensure CSS animation compatibility
      const aura = svgEl("polyline", { 
        points: pts, 
        fill: "none", 
        "stroke-linecap": "round", 
        "stroke-linejoin": "round" 
      });
      aura.style.stroke = beamColor; 
      aura.style.animation = "neonPulse 0.4s ease-in-out infinite";
      svg.appendChild(aura);

      // CORE: Static white core
      const core = svgEl("polyline", { 
        points: pts, 
        fill: "none", 
        stroke: "#ffffff",
        "stroke-linecap": "round", 
        "stroke-linejoin": "round" 
      });
      core.style.animation = "corePulse 0.4s ease-in-out infinite";
      svg.appendChild(core);
    }
  }

  render();
})();
</script>
</body>
</html>
