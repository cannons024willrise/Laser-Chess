<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{

      --theme-rgb:3,233,244;
      --red-theme:#f44336;
      --red-rgb:244,67,54;
      --bg0:#06080b;

      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;

    }
    body {

        url('https://cannons024willrise.github.io/Laser-Chess/docs/home/Gemini_Generated_Image_tjcevutjcevutjce.png') center center / cover fixed no-repeat;
    }
    .shell { height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.4rem 1.25rem; border-bottom: 1px solid var(--line); background: rgba(5,7,10,.84); box-shadow: 0 10px 30px rgba(0,0,0,.45); z-index: 5; flex-shrink: 0; }

    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 240px); gap: 1rem; width: 100%; height: 100%; max-width: 1600px; background: var(--panel); border: 2px solid rgba(255, 255, 255, 0.12); border-radius: 20px; box-shadow: var(--shadow); padding: 0.75rem; align-items: center; position: relative; overflow: hidden; }
    .panel { background: rgba(0, 0, 0, 0.25); border: 1px solid var(--line); border-radius: 14px; }
    .board-panel { padding: .25rem; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; overflow: hidden; }
    .board-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .board-shell { width: 100%; height: 100%; padding: .25rem; border-radius: 16px; background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    svg#board { width: auto; height: auto; max-width: 100%; max-height: 100%; aspect-ratio: 10 / 8; object-fit: contain; display: block; background: linear-gradient(180deg, rgba(1,3,6,.95), rgba(10,12,15,.92)); border-radius: 12px; touch-action: manipulation; }
    .sidebar { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .side-card { padding: .75rem; height: 100%; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
    .side-card h3 { margin: 0 0 .4rem; text-transform: uppercase; letter-spacing: .18em; font-size: .8rem; text-align: center; }
    .turn-row { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .4rem; }

    .turn-blue { color: var(--theme-color); border-color: rgba(var(--theme-rgb), .35); }
    .turn-red { color: #ff8f84; border-color: rgba(244,67,54,.35); }
    .controls { display: grid; grid-template-columns: 1fr; gap: .3rem; }
    .btn { appearance: none; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); padding: .55rem .45rem; border-radius: 10px; cursor: pointer; letter-spacing: .08em; text-transform: uppercase; font-size: .68rem; transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease; user-select: none; width: 100%; display: inline-flex; justify-content: center; align-items: center; }
    .btn:hover { transform: translateY(-1px); border-color: rgba(var(--theme-rgb), .35); box-shadow: 0 0 0 1px rgba(var(--theme-rgb), .18), 0 8px 20px rgba(0,0,0,.24); }
    .btn.primary { background: linear-gradient(180deg, rgba(var(--theme-rgb), .16), rgba(var(--theme-rgb), .06)); border-color: rgba(var(--theme-rgb), .35); color: var(--theme-color); }
    .btn.danger { background: linear-gradient(180deg, rgba(244,67,54,.16), rgba(244,67,54,.06)); border-color: rgba(244,67,54,.38); color: #ffb0a8; }
    .kbd { display: inline-flex; align-items: center; justify-content: center; padding: .1rem .25rem; border: 1px solid rgba(255,255,255,0.1); border-bottom-width: 2px; border-radius: 4px; background: rgba(255,255,255,.04); color: var(--text); font-size: .7em; margin-left: auto; }
    @keyframes laserPulse { 0% { stroke-width: 10px; opacity: 0.15; } 50% { stroke-width: 26px; opacity: 0.85; } 100% { stroke-width: 10px; opacity: 0.15; } }
    .animated-laser-glow { animation: laserPulse 0.5s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand"><h1>Laser Chess</h1></div>
    <div class="header-meta">
      <div class="pill" id="movePill">Move 1</div>
      <div class="pill" id="savePill">Saved locally</div>
    </div>
  </header>
  <div class="dialogue-overlay">
    <main class="layout" role="dialog" aria-modal="true" aria-label="Laser Chess Gameplay Interface">
      <section class="panel board-panel">
        <div class="board-wrap">
          <div class="board-shell">
            <svg id="board" viewBox="0 0 1000 800" aria-label="Laser Chess board" tabindex="0"></svg>
          </div>
        </div>
      </section>
      <aside class="sidebar">
        <section class="panel side-card">
          <div>
            <h3>Turn controls</h3>
            <div class="turn-row">
              <div id="turnBadge" class="turn-badge turn-blue">BLUE to move</div>
              <div class="turn-badge" id="phaseBadge">Select a piece</div>
            </div>
          </div>
          <div class="controls">
            <button class="btn primary" id="fireBtn">Fire Laser <span class="kbd">F</span></button>
            <button class="btn" id="rotateCCWBtn">↺ Rotate CCW <span class="kbd">Q</span></button>
            <button class="btn" id="rotateCWBtn">Rotate CW ↻ <span class="kbd">E</span></button>
            <button class="btn" id="endTurnBtn">Pass / End Turn</button>
            <button class="btn danger" id="resetBtn">Reset Game <span class="kbd">N</span></button>
          </div>
        </section>
      </aside>
    </main>
  </div>
</div>
<script>
(() => {
  "use strict";
  const PIECE_BASE = "./";
  const RES_BLUE = [{x:9,y:0},{x:9,y:1},{x:9,y:2},{x:9,y:3},{x:9,y:4},{x:9,y:5},{x:9,y:6},{x:9,y:7},{x:1,y:0},{x:1,y:7}];
  const RES_RED  = [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:0,y:4},{x:0,y:5},{x:0,y:6},{x:0,y:7},{x:8,y:0},{x:8,y:7}];
  const W = 10, H = 8, CELL = 100;
  const DIRS = [{dx: 0, dy: 1}, {dx: 1, dy: 0}, {dx: 0, dy: -1}, {dx: -1, dy: 0}];
  const PIECE_MAP = { KING: "king", DEFENDER: "defender", DEFLECTOR: "deflector", SWITCH: "switch", LASER: "laser" };
  const INTERACTION_MAP = {
    KING: { 0: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 1: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } } },
    DEFENDER: { 0: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: true } }, 1: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: false } } },
    DEFLECTOR: { 0: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: 2, isDestroyed: false } }, 1: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } } },
    SWITCH: { 0: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: 2, isDestroyed: false } }, 1: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } }, 2: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: 2, isDestroyed: false } }, 3: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } } },
    LASER: { 0: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 1: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 2: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 3: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } } }
  };
  const START_STATE = () => ({ turn: "BLUE", moveNumber: 1, winner: null, lastLaserPath: [], pieces: [ {id: "pmpfnkxpm1", pieceType: "KING", color: "BLUE", rotation: 0, x: 4, y: 0}, {id: "pmpfnl4j03", pieceType: "KING", color: "RED", rotation: 0, x: 5, y: 7}, {id: "pmpfqugdq4", pieceType: "DEFENDER", color: "RED", rotation: 0, x: 4, y: 7}, {id: "pmpfquhvx5", pieceType: "DEFENDER", color: "RED", rotation: 2, x: 6, y: 7}, {id: "pmpfqunnp6", pieceType: "DEFENDER", color: "BLUE", rotation: 2, x: 5, y: 0}, {id: "pmpfquoqi7", pieceType: "DEFENDER", color: "BLUE", rotation: 2, x: 3, y: 0}, {id: "pmpfqvc388", pieceType: "SWITCH", color: "BLUE", rotation: 0, x: 5, y: 3}, {id: "pmpfqvfrb9", pieceType: "SWITCH", color: "BLUE", rotation: 1, x: 4, y: 3}, {id: "pmpfqvl06a", pieceType: "SWITCH", color: "RED", rotation: 0, x: 4, y: 4}, {id: "pmpfqvre4b", pieceType: "SWITCH", color: "RED", rotation: 1, x: 5, y: 4}, {id: "pmpfqwdqec", pieceType: "LASER", color: "RED", rotation: 2, x: 0, y: 7}, {id: "pmpfqy5dve", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 2, y: 0}, {id: "pmpfqya0pf", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 2, y: 3}, {id: "pmpfqyd1rg", pieceType: "DEFLECTOR", color: "BLUE", rotation: 1, x: 2, y: 4}, {id: "pmpfqz0jlj", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 0, y: 3}, {id: "pmpfqz7fpk", pieceType: "DEFLECTOR", color: "RED", rotation: 3, x: 0, y: 4}, {id: "pmpfqzj2ul", pieceType: "DEFLECTOR", color: "BLUE", rotation: 3, x: 7, y: 1}, {id: "pmpfr0e5km", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 6, y: 2}, {id: "pmpfr0t7zn", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 7, y: 4}, {id: "pmpfr0ww1o", pieceType: "DEFLECTOR", color: "RED", rotation: 3, x: 7, y: 3}, {id: "pmpfr18esp", pieceType: "DEFLECTOR", color: "BLUE", rotation: 1, x: 9, y: 3}, {id: "pmpfr1bjtq", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 9, y: 4}, {id: "pmpfr2ek5s", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 3, y: 5}, {id: "pmpfr2sl8u", pieceType: "DEFLECTOR", color: "RED", rotation: 1, x: 2, y: 6}, {id: "pmpfr337lv", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 7, y: 7}, {id: "pmpfr69imw", pieceType: "LASER", color: "BLUE", rotation: 0, x: 9, y: 0} ] });
  const el = { board: document.getElementById("board"), movePill: document.getElementById("movePill"), savePill: document.getElementById("savePill"), turnBadge: document.getElementById("turnBadge"), phaseBadge: document.getElementById("phaseBadge"), fireBtn: document.getElementById("fireBtn"), resetBtn: document.getElementById("resetBtn"), rotateCCWBtn: document.getElementById("rotateCCWBtn"), rotateCWBtn: document.getElementById("rotateCWBtn"), endTurnBtn: document.getElementById("endTurnBtn") };
  let state = loadState() || START_STATE(), selectedId = null, cursor = { x: 0, y: 0 }, flashTimer = null;
  function loadState() { try { const r = localStorage.getItem("laserchess_local_state"); return r ? JSON.parse(r) : null; } catch { return null; } }
  function saveState() { localStorage.setItem("laserchess_local_state", JSON.stringify(state)); }
  function clone(v) { return JSON.parse(JSON.stringify(v)); }
  function pieceImage(p) { return `${PIECE_BASE}${p.color.toLowerCase()}${PIECE_MAP[p.pieceType]}.png`; }
  function pieceAt(x, y, ps = state.pieces) { return ps.find(p => p.x === x && p.y === y) || null; }
  function isReserved(x, y, c) { return (c === "BLUE" ? RES_BLUE : RES_RED).some(s => s.x === x && s.y === y); }
  function inBounds(x, y) { return x >= 0 && x < W && y >= 0 && y < H; }
  function norm(r) { return ((r % 4) + 4) % 4; }
  function enemy(c) { return c === "BLUE" ? "RED" : "BLUE"; }
  function getSelected() { return selectedId ? state.pieces.find(p => p.id === selectedId) || null : null; }
  function select(p) { selectedId = p ? p.id : null; updateUI(); render(); }
  function updateUI() {
    const p = getSelected();
    el.movePill.textContent = `Move ${state.moveNumber}`;
    el.turnBadge.textContent = `${state.turn} to move`;
    el.turnBadge.className = `turn-badge ${state.turn === "BLUE" ? "turn-blue" : "turn-red"}`;
    el.phaseBadge.textContent = state.winner ? `${state.winner} wins` : (p ? `Selected ${p.pieceType}` : "Select a piece");
  }
  function legalMoves(p) {
    const moves = [];
    if (!p || p.color !== state.turn || p.pieceType === "LASER") return moves;
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) continue;
        const nx = p.x + dx, ny = p.y + dy;
        if (!inBounds(nx, ny) || isReserved(nx, ny, p.color)) continue;
        const occ = pieceAt(nx, ny);
        if (!occ) moves.push({ type: "move", x: nx, y: ny });
        else if (p.pieceType === "SWITCH" && (occ.pieceType === "DEFLECTOR" || occ.pieceType === "DEFENDER") && !isReserved(p.x, p.y, occ.color)) moves.push({ type: "swap", x: nx, y: ny });
      }
    }
    return moves;
  }
  function movePiece(p, nx, ny) {
    if (!p || p.color !== state.turn || p.pieceType === "LASER") return false;
    const occ = pieceAt(nx, ny);
    if (occ) {
      if (p.pieceType !== "SWITCH" || !(occ.pieceType === "DEFLECTOR" || occ.pieceType === "DEFENDER") || isReserved(p.x, p.y, occ.color)) return false;
      const ox = p.x, oy = p.y; p.x = nx; p.y = ny; occ.x = ox; occ.y = oy; return true;
    }
    if (isReserved(nx, ny, p.color) || Math.max(Math.abs(nx - p.x), Math.abs(ny - p.y)) !== 1) return false;
    p.x = nx; p.y = ny; return true;
  }
  function fireLaser() {
    if (state.winner) return false;
    setTimeout(() => {
      const shooter = state.pieces.find(p => p.pieceType === "LASER" && p.color === state.turn);
      if (!shooter) return;

      const res = (function trace(x, y, d, ps, path = [], seen = new Set()) {

        path.push({ x, y, dir: d });

        if (!p) return trace(x + DIRS[d].dx, y + DIRS[d].dy, d, ps, path, seen);

        state.pieces.splice(state.pieces.findIndex(p => p.id === res.hit.piece.id), 1);
        if (res.hit.piece.pieceType === "KING") state.winner = state.turn;
      }
      state.turn = enemy(state.turn); state.moveNumber += 1; selectedId = null; saveState(); updateUI(); render();
      if (flashTimer) clearTimeout(flashTimer);
      flashTimer = setTimeout(() => { state.lastLaserPath = []; render(); }, 3000);
    }, 1000);
    return true;
  }
  function svgEl(n, a = {}) { const node = document.createElementNS("http://www.w3.org/2000/svg", n); for (const [k, v] of Object.entries(a)) node.setAttribute(k, String(v)); return node; }
  function render() {
    const svg = el.board; svg.innerHTML = "";
    svg.appendChild(svgEl("defs", {})); const defs = svg.querySelector("defs");
    const fGlow = svgEl("filter", { id: "laserGlow" }); fGlow.appendChild(svgEl("feGaussianBlur", { stdDeviation: "5" })); defs.appendChild(fGlow);

      const r = svgEl("rect", { x: x * CELL, y: y * CELL, width: CELL, height: CELL, fill: res ? (res === "blue" ? "rgba(3,233,244,.08)" : "rgba(244,67,54,.08)") : "rgba(0,0,0,.42)", stroke: "rgba(255,255,255,.07)" });
      r.addEventListener("click", () => onCellClick(x, y)); svg.appendChild(r);
    }
    if (state.lastLaserPath?.length) {
      const pts = state.lastLaserPath.map(p => `${p.x * CELL + 50},${p.y * CELL + 50}`).join(" ");
      svg.appendChild(svgEl("polyline", { points: pts, fill: "none", stroke: "rgba(255,255,255,1)", "stroke-width": "4", filter: "url(#laserGlow)", class: "animated-laser-glow" }));
    }
    for (const p of state.pieces) {
      const g = svgEl("g"); const x = p.x * CELL, y = p.y * CELL;
      const img = svgEl("image", { href: pieceImage(p), x: x + 6, y: y + 6, width: CELL - 12, height: CELL - 12, transform: `rotate(${(p.rotation || 0) * 90} ${x + 50} ${y + 50})` });
      g.appendChild(img); g.addEventListener("click", (ev) => { ev.stopPropagation(); if (state.winner || p.color !== state.turn) return; select(p); cursor = { x: p.x, y: p.y }; render(); }); svg.appendChild(g);
    }
    if (state.winner) {
      svg.appendChild(svgEl("rect", { x: 150, y: 255, width: 700, height: 290, rx: 26, fill: "rgba(0,0,0,.85)", stroke: "rgba(255,255,255,.14)" }));
      const t = svgEl("text", { x: 500, y: 385, "text-anchor": "middle", fill: "white", "font-size": "52" }); t.textContent = `${state.winner} WINS`; svg.appendChild(t);
    }
  }
  function onCellClick(x, y) {
    if (state.winner) return;
    const sel = getSelected();
    if (sel && sel.color === state.turn && movePiece(sel, x, y)) fireLaser();
    else cursor = { x, y };
  }
  el.rotateCCWBtn.addEventListener("click", () => { const p = getSelected(); if (p && p.color === state.turn && p.pieceType !== "KING") { p.rotation = norm(p.rotation + 3); fireLaser(); } });

})();
</script>
