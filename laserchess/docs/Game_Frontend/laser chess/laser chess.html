<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --theme-color:#03e9f4;
      --theme-rgb:3,233,244;
      --red-theme:#f44336;
      --red-rgb:244,67,54;
      --bg0:#06080b;
      --bg1:#0d1116;
      --bg2:#121821;
      --panel:rgba(8,10,14,.94);
      --line:rgba(255,255,255,.08);
      --text:#e8f6ff;
      --muted:#97a8b6;
      --shadow:0 25px 70px rgba(0,0,0,.85);
    }
    * { box-sizing: border-box; }
    html, body { 
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden !important;
    }
    body {
      font-family: "Quantico", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.9)),
        url('https://cannons024willrise.github.io/Laser-Chess/docs/home/Gemini_Generated_Image_tjcevutjcevutjce.png') center center / cover fixed no-repeat;
    }
    
    .shell {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.4rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: rgba(5,7,10,.84);
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      z-index: 5;
      flex-shrink: 0;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      letter-spacing: .16em;
      font-weight: 900;
      text-transform: uppercase;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .pill {
      padding: .25rem .65rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    
    .dialogue-overlay {
      flex: 1;
      width: 100%;
      background: rgba(3, 4, 7, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 240px);
      gap: 1rem;
      width: 100%;
      height: 100%;
      max-width: 1600px;
      background: var(--panel);
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 0.75rem;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .layout::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(var(--theme-rgb), 0.3), transparent 60%, rgba(244,67,54,0.15));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .panel {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .board-panel {
      padding: .25rem;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .board-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board-shell {
      width: 100%;
      height: 100%;
      padding: .25rem;
      border-radius: 16px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    svg#board {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 10 / 8;
      object-fit: contain;
      display: block;
      background: linear-gradient(180deg, rgba(1,3,6,.95), rgba(10,12,15,.92));
      border-radius: 12px;
      touch-action: manipulation;
    }
    
    .sidebar {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }
    .side-card {
      padding: .75rem;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .side-card h3 {
      margin: 0 0 .4rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: .8rem;
      text-align: center;
    }
    .turn-row {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      margin-bottom: .4rem;
    }
    .turn-badge {
      padding: .4rem .5rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .65rem;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .turn-blue { color: var(--theme-color); border-color: rgba(var(--theme-rgb), .35); }
    .turn-red { color: #ff8f84; border-color: rgba(244,67,54,.35); }
    
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: .3rem;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: .55rem .45rem;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .68rem;
      transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      user-select: none;
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--theme-rgb), .35);
      box-shadow: 0 0 0 1px rgba(var(--theme-rgb), .18), 0 8px 20px rgba(0,0,0,.24);
    }
    .btn.primary {
      background: linear-gradient(180deg, rgba(var(--theme-rgb), .16), rgba(var(--theme-rgb), .06));
      border-color: rgba(var(--theme-rgb), .35);
      color: var(--theme-color);
    }
    .btn.danger {
      background: linear-gradient(180deg, rgba(244,67,54,.16), rgba(244,67,54,.06));
      border-color: rgba(244,67,54,.38);
      color: #ffb0a8;
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .1rem .25rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-width: 2px;
      border-radius: 4px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: .7em;
      margin-left: auto;
    }

    /* --- THEMES.CSS INSPIRED ANIMATION MATRIX --- */
    
    @keyframes laserPulse {
      0% { stroke-width: 10px; opacity: 0.15; }
      50% { stroke-width: 26px; opacity: 0.85; }
      100% { stroke-width: 10px; opacity: 0.15; }
    }
    .animated-laser-glow {
      animation: laserPulse 0.5s ease-in-out infinite;
    }

    @keyframes tacticalAuraPulse {
      0%, 100% {
        transform: scale(0.95);
        fill-opacity: 0.08;
        stroke-opacity: 0.25;
        filter: url(#lowBloomFilter);
      }
      50% {
        transform: scale(1.03);
        fill-opacity: 0.32;
        stroke-opacity: 0.90;
        filter: url(#highBloomFilter);
      }
    }
    .animated-aura-box {
      animation: tacticalAuraPulse 2.8s infinite ease-in-out;
    }

    @media (max-width: 640px){
      .dialogue-overlay { padding: .15rem; }
      .layout {
        grid-template-columns: minmax(0, 1fr) minmax(0, 130px);
        padding: .4rem;
        gap: .35rem;
        border-radius: 12px;
      }
      .layout::before { border-radius: 12px; }
      .kbd { display: none; }
      .btn { font-size: 0.58rem; padding: .45rem .2rem; border-radius: 6px; }
      .side-card h3 { font-size: 0.62rem; margin-bottom: 0.2rem; }
      .turn-badge { font-size: 0.55rem; padding: .25rem .1rem; }
    }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">
      <h1>Laser Chess</h1>
    </div>
    <div class="header-meta">
      <div class="pill" id="movePill">Move 1</div>
      <div class="pill" id="savePill">Saved locally</div>
    </div>
  </header>

  <div class="dialogue-overlay">
    <main class="layout" role="dialog" aria-modal="true" aria-label="Laser Chess Gameplay Interface">
      <section class="panel board-panel">
        <div class="board-wrap">
          <div class="board-shell">
            <svg id="board" viewBox="0 0 1000 800" aria-label="Laser Chess board" tabindex="0"></svg>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel side-card">
          <div>
            <h3>Turn controls</h3>
            <div class="turn-row">
              <div id="turnBadge" class="turn-badge turn-blue">BLUE to move</div>
              <div class="turn-badge" id="phaseBadge">Select a piece</div>
            </div>
          </div>
          <div class="controls">
            <button class="btn primary" id="fireBtn">Fire Laser <span class="kbd">F</span></button>
            <button class="btn" id="rotateCCWBtn">↺ Rotate CCW <span class="kbd">Q</span></button>
            <button class="btn" id="rotateCWBtn">Rotate CW ↻ <span class="kbd">E</span></button>
            <button class="btn" id="endTurnBtn">Pass / End Turn</button>
            <button class="btn danger" id="resetBtn">Reset Game <span class="kbd">N</span></button>
          </div>
        </section>
      </aside>
    </main>
  </div>
</div>

<script>
(() => {
  "use strict";

  const PIECE_BASE = "./";
  const RES_BLUE = [{x:9,y:0},{x:9,y:1},{x:9,y:2},{x:9,y:3},{x:9,y:4},{x:9,y:5},{x:9,y:6},{x:9,y:7},{x:1,y:0},{x:1,y:7}];
  const RES_RED  = [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:0,y:4},{x:0,y:5},{x:0,y:6},{x:0,y:7},{x:8,y:0},{x:8,y:7}];
  const W = 10, H = 8;
  const CELL = 100;
  
  const DIRS = [{dx: 0, dy: 1}, {dx: 1, dy: 0}, {dx: 0, dy: -1}, {dx: -1, dy: 0}];
  const PIECE_MAP = { KING: "king", DEFENDER: "defender", DEFLECTOR: "deflector", SWITCH: "switch", LASER: "laser" };

  const INTERACTION_MAP = {
    KING: { 0: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 1: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } } },
    DEFENDER: { 0: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: true } }, 1: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: false } } },
    DEFLECTOR: { 0: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: 2, isDestroyed: false } }, 1: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: null, isDestroyed: true }, 3: { reflect: null, isDestroyed: true } }, 2: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: null, isDestroyed: true } }, 3: { 0: { reflect: null, isDestroyed: true }, 1: { reflect: null, isDestroyed: true }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } } },
    SWITCH: { 0: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: 2, isDestroyed: false } }, 1: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } }, 2: { 0: { reflect: 1, isDestroyed: false }, 1: { reflect: 0, isDestroyed: false }, 2: { reflect: 3, isDestroyed: false }, 3: { reflect: 2, isDestroyed: false } }, 3: { 0: { reflect: 3, isDestroyed: false }, 1: { reflect: 2, isDestroyed: false }, 2: { reflect: 1, isDestroyed: false }, 3: { reflect: 0, isDestroyed: false } } },
    LASER: { 0: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 1: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 2: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } }, 3: { 0: { reflect: null, isDestroyed: false }, 1: { reflect: null, isDestroyed: false }, 2: { reflect: null, isDestroyed: false }, 3: { reflect: null, isDestroyed: false } } }
  };

  const START_STATE = () => ({
    turn: "BLUE", moveNumber: 1, winner: null, lastLaserPath: [], history: [],
    pieces: [
      {id: "pmpfnkxpm1", pieceType: "KING", color: "BLUE", rotation: 0, x: 4, y: 0}, {id: "pmpfnl4j03", pieceType: "KING", color: "RED", rotation: 0, x: 5, y: 7}, {id: "pmpfqugdq4", pieceType: "DEFENDER", color: "RED", rotation: 0, x: 4, y: 7}, {id: "pmpfquhvx5", pieceType: "DEFENDER", color: "RED", rotation: 2, x: 6, y: 7}, {id: "pmpfqunnp6", pieceType: "DEFENDER", color: "BLUE", rotation: 2, x: 5, y: 0}, {id: "pmpfquoqi7", pieceType: "DEFENDER", color: "BLUE", rotation: 2, x: 3, y: 0}, {id: "pmpfqvc388", pieceType: "SWITCH", color: "BLUE", rotation: 0, x: 5, y: 3}, {id: "pmpfqvfrb9", pieceType: "SWITCH", color: "BLUE", rotation: 1, x: 4, y: 3}, {id: "pmpfqvl06a", pieceType: "SWITCH", color: "RED", rotation: 0, x: 4, y: 4}, {id: "pmpfqvre4b", pieceType: "SWITCH", color: "RED", rotation: 1, x: 5, y: 4}, {id: "pmpfqwdqec", pieceType: "LASER", color: "RED", rotation: 2, x: 0, y: 7}, {id: "pmpfqy5dve", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 2, y: 0}, {id: "pmpfqya0pf", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 2, y: 3}, {id: "pmpfqyd1rg", pieceType: "DEFLECTOR", color: "BLUE", rotation: 1, x: 2, y: 4}, {id: "pmpfqz0jlj", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 0, y: 3}, {id: "pmpfqz7fpk", pieceType: "DEFLECTOR", color: "RED", rotation: 3, x: 0, y: 4}, {id: "pmpfqzj2ul", pieceType: "DEFLECTOR", color: "BLUE", rotation: 3, x: 7, y: 1}, {id: "pmpfr0e5km", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 6, y: 2}, {id: "pmpfr0t7zn", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 7, y: 4}, {id: "pmpfr0ww1o", pieceType: "DEFLECTOR", color: "RED", rotation: 3, x: 7, y: 3}, {id: "pmpfr18esp", pieceType: "DEFLECTOR", color: "BLUE", rotation: 1, x: 9, y: 3}, {id: "pmpfr1bjtq", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 9, y: 4}, {id: "pmpfr2ek5s", pieceType: "DEFLECTOR", color: "BLUE", rotation: 2, x: 3, y: 5}, {id: "pmpfr2sl8u", pieceType: "DEFLECTOR", color: "RED", rotation: 1, x: 2, y: 6}, {id: "pmpfr337lv", pieceType: "DEFLECTOR", color: "RED", rotation: 0, x: 7, y: 7}, {id: "pmpfr69imw", pieceType: "LASER", color: "BLUE", rotation: 0, x: 9, y: 0},
    ],
  });

  const el = { board: document.getElementById("board"), movePill: document.getElementById("movePill"), turnBadge: document.getElementById("turnBadge"), phaseBadge: document.getElementById("phaseBadge"), fireBtn: document.getElementById("fireBtn"), resetBtn: document.getElementById("resetBtn"), rotateCCWBtn: document.getElementById("rotateCCWBtn"), rotateCWBtn: document.getElementById("rotateCWBtn"), endTurnBtn: document.getElementById("endTurnBtn") };
  let state = loadState() || START_STATE();
  let selectedId = null; let cursor = { x: 0, y: 0 }; let flashTimer = null;

  function serializeBoard(pieces) { return pieces.map(p => `${p.pieceType}|${p.color}|${p.x}|${p.y}|${p.rotation}`).sort().join(";"); }
  function checkRepetition(pieces) {
    const sig = serializeBoard(pieces);
    state.history.push(sig);
    if (state.history.filter(s => s === sig).length >= 3) state.winner = "DRAW";
  }

  function loadState() { try { const r = localStorage.getItem("laserchess_local_state"); return r ? JSON.parse(r) : null; } catch { return null; } }
  function saveState() { localStorage.setItem("laserchess_local_state", JSON.stringify(state)); }
  function clone(v) { return JSON.parse(JSON.stringify(v)); }
  function pieceImage(p) { return `${PIECE_BASE}${p.color.toLowerCase()}${PIECE_MAP[p.pieceType]}.png`; }
  function pieceAt(x, y, pieces = state.pieces) { return pieces.find(p => p.x === x && p.y === y) || null; }
  function isReserved(x, y, color) { return (color === "BLUE" ? RES_BLUE : RES_RED).some(s => s.x === x && s.y === y); }
  function inBounds(x, y) { return x >= 0 && x < W && y >= 0 && y < H; }
  function norm(rot) { return ((rot % 4) + 4) % 4; }
  function enemy(c) { return c === "BLUE" ? "RED" : "BLUE"; }
  function getSelected() { return selectedId ? state.pieces.find(p => p.id === selectedId) || null : null; }
  
  function updateUI() {
    const p = getSelected();
    el.movePill.textContent = `Move ${state.moveNumber}`;
    el.turnBadge.textContent = `${state.turn} to move`;
    el.turnBadge.className = `turn-badge ${state.turn === "BLUE" ? "turn-blue" : "turn-red"}`;
    el.phaseBadge.textContent = state.winner ? `${state.winner}` : (p ? `Selected ${p.pieceType}` : "Select a piece");
  }

  function fireLaser() {
    if (state.winner) return;
    const shooter = state.pieces.find(p => p.pieceType === "LASER" && p.color === state.turn);
    if (!shooter) return;
    const dir = [2, 1, 0, 3][norm(shooter.rotation)];
    const result = resolveLaserVector(shooter.x + DIRS[dir].dx, shooter.y + DIRS[dir].dy, dir, clone(state.pieces));
    state.lastLaserPath = result.path;
    if (result.hit?.destroyed) {
      state.pieces.splice(state.pieces.findIndex(p => p.id === result.hit.piece.id), 1);
      if (result.hit.piece.pieceType === "KING") state.winner = state.turn;
    }
    state.turn = enemy(state.turn);
    state.moveNumber++;
    checkRepetition(state.pieces);
    render();
    flashLaserPath();
  }

  function resolveLaserVector(x, y, dir, pieces, path = [], seen = new Set()) {
    if (!inBounds(x, y)) return { path, hit: null };
    const key = `${x},${y},${dir}`;
    if (seen.has(key)) return { path, hit: null };
    seen.add(key);
    path.push({ x, y, dir });
    const p = pieceAt(x, y, pieces);
    if (!p) return resolveLaserVector(x + DIRS[dir].dx, y + DIRS[dir].dy, dir, pieces, path, seen);
    const out = INTERACTION_MAP[p.pieceType][norm(p.rotation || 0)]?.[dir];
    if (!out) return { path, hit: null };
    if (out.isDestroyed) return { path, hit: { piece: p, destroyed: true } };
    if (out.reflect !== null) return resolveLaserVector(x + DIRS[out.reflect].dx, y + DIRS[out.reflect].dy, out.reflect, pieces, path, seen);
    return { path, hit: null };
  }

  function doMove(tx, ty) {
    const p = getSelected();
    if (!p || p.color !== state.turn) return;
    const occ = pieceAt(tx, ty);
    if (occ) {
      if (p.pieceType !== "SWITCH" || !(occ.pieceType === "DEFLECTOR" || occ.pieceType === "DEFENDER") || isReserved(p.x, p.y, occ.color)) return;
      [p.x, p.y, occ.x, occ.y] = [occ.x, occ.y, p.x, p.y];
    } else {
      if (isReserved(tx, ty, p.color) || Math.max(Math.abs(tx - p.x), Math.abs(ty - p.y)) !== 1) return;
      p.x = tx; p.y = ty;
    }
    selectedId = null;
    state.turn = enemy(state.turn);
    state.moveNumber++;
    checkRepetition(state.pieces);
    render();
  }

  function rotate(d) {
    const p = getSelected();
    if (!p || p.color !== state.turn || p.pieceType === "KING") return;
    p.rotation = norm((p.rotation || 0) + d);
    selectedId = null;
    state.turn = enemy(state.turn);
    state.moveNumber++;
    checkRepetition(state.pieces);
    render();
  }

  function render() {
    const svg = el.board;
    svg.innerHTML = `
      <defs>
        <filter id="laserGlow"><feGaussianBlur stdDeviation="5"/><feMerge><feMergeNode/><feMergeNode/></feMerge></filter>
        <filter id="lowBloomFilter"><feGaussianBlur stdDeviation="5"/><feMerge><feMergeNode/><feMergeNode/></feMerge></filter>
        <filter id="highBloomFilter"><feGaussianBlur stdDeviation="12"/><feMerge><feMergeNode/><feMergeNode/></feMerge></filter>
      </defs>`;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const res = isReserved(x, y, "BLUE") ? "blue" : isReserved(x, y, "RED") ? "red" : null;
      const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      r.setAttribute("x", x*CELL); r.setAttribute("y", y*CELL); r.setAttribute("width", CELL); r.setAttribute("height", CELL);
      r.setAttribute("fill", res ? (res === "blue" ? "rgba(3,233,244,.08)" : "rgba(244,67,54,.08)") : "rgba(0,0,0,.42)");
      r.setAttribute("stroke", "rgba(255,255,255,.07)");
      r.addEventListener("click", () => { cursor = {x, y}; onCellClick(x, y); });
      svg.appendChild(r);
    }
    if (state.lastLaserPath?.length) {
      const pts = state.lastLaserPath.map(p => `${p.x * CELL + 50},${p.y * CELL + 50}`).join(" ");
      const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      poly.setAttribute("points", pts); poly.setAttribute("fill", "none"); poly.setAttribute("stroke", "white"); poly.setAttribute("stroke-width", "4"); poly.setAttribute("filter", "url(#laserGlow)"); poly.setAttribute("class", "animated-laser-glow");
      svg.appendChild(poly);
    }
    for (const p of state.pieces) {
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      const aura = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      aura.setAttribute("x", p.x*CELL+6); aura.setAttribute("y", p.y*CELL+6); aura.setAttribute("width", CELL-12); aura.setAttribute("height", CELL-12); aura.setAttribute("fill", p.color === "BLUE" ? "rgba(3,233,244,1)" : "rgba(244,67,54,1)"); aura.setAttribute("rx", "10"); aura.setAttribute("class", "animated-aura-box");
      g.appendChild(aura);
      const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
      img.setAttribute("href", pieceImage(p)); img.setAttribute("x", p.x*CELL+6); img.setAttribute("y", p.y*CELL+6); img.setAttribute("width", CELL-12); img.setAttribute("height", CELL-12); img.setAttribute("transform", `rotate(${(p.rotation || 0) * 90} ${p.x*CELL+50} ${p.y*CELL+50})`);
      g.appendChild(img);
      g.addEventListener("click", (e) => { e.stopPropagation(); selectedId = p.id; render(); });
      svg.appendChild(g);
    }
    if (state.winner) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect"); rect.setAttribute("x", 150); rect.setAttribute("y", 255); rect.setAttribute("width", 700); rect.setAttribute("height", 290); rect.setAttribute("rx", 26); rect.setAttribute("fill", "rgba(0,0,0,.9)");
      const txt = document.createElementNS("http://www.w3.org/2000/svg", "text"); txt.setAttribute("x", 500); txt.setAttribute("y", 400); txt.setAttribute("text-anchor", "middle"); txt.setAttribute("fill", "white"); txt.setAttribute("font-size", "60"); txt.textContent = state.winner === "DRAW" ? "DRAW!" : `${state.winner} WINS!`;
      svg.appendChild(rect); svg.appendChild(txt);
    }
    updateUI(); saveState();
  }

  function onCellClick(x, y) { if (!state.winner) doMove(x, y); }
  function flashLaserPath() { if (flashTimer) clearTimeout(flashTimer); flashTimer = setTimeout(() => { state.lastLaserPath = []; render(); }, 1400); }

  el.fireBtn.addEventListener("click", fireLaser);
  el.rotateCCWBtn.addEventListener("click", () => rotate(3));
  el.rotateCWBtn.addEventListener("click", () => rotate(1));
  el.resetBtn.addEventListener("click", () => { state = START_STATE(); render(); });
  el.endTurnBtn.addEventListener("click", () => { state.turn = enemy(state.turn); checkRepetition(state.pieces); render(); });
  window.addEventListener("keydown", (e) => {
    if (e.key === "f") fireLaser(); if (e.key === "q") rotate(3); if (e.key === "e") rotate(1);
  });
  render();
})();
</script>
</body>
</html>
