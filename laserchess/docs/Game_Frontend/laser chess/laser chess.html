<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laser Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --theme-color:#03e9f4;
      --theme-rgb:3,233,244;
      --red-theme:#f44336;
      --red-rgb:244,67,54;
      --bg0:#06080b;
      --bg1:#0d1116;
      --bg2:#121821;
      --panel:rgba(8,10,14,.94);
      --line:rgba(255,255,255,.08);
      --text:#e8f6ff;
      --muted:#97a8b6;
      --shadow:0 25px 70px rgba(0,0,0,.85);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden !important; }
    body { font-family: "Quantico", sans-serif; color: var(--text); background: linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.9)), url('https://cannons024willrise.github.io/Laser-Chess/docs/home/Gemini_Generated_Image_tjcevutjcevutjce.png') center center / cover fixed no-repeat; }
    
    .shell { height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.4rem 1.25rem; border-bottom: 1px solid var(--line); background: rgba(5,7,10,.84); box-shadow: 0 10px 30px rgba(0,0,0,.45); z-index: 5; flex-shrink: 0; }
    .brand h1 { margin: 0; font-size: clamp(1rem, 1.8vw, 1.4rem); letter-spacing: .16em; font-weight: 900; text-transform: uppercase; }
    .header-meta { display: flex; align-items: center; gap: .7rem; }
    .pill { padding: .25rem .65rem; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.04); font-size: .7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    
    .dialogue-overlay { flex: 1; width: 100%; background: rgba(3, 4, 7, 0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 0.5rem; overflow: hidden; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 240px); gap: 1rem; width: 100%; height: 100%; max-width: 1600px; background: var(--panel); border: 2px solid rgba(255, 255, 255, 0.12); border-radius: 20px; box-shadow: var(--shadow); padding: 0.75rem; align-items: center; position: relative; overflow: hidden; }
    .panel { background: rgba(0, 0, 0, 0.25); border: 1px solid var(--line); border-radius: 14px; }
    .board-panel { padding: .25rem; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; overflow: hidden; }
    .board-shell { width: 100%; height: 100%; padding: .25rem; border-radius: 16px; background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    svg#board { width: auto; height: auto; max-width: 100%; max-height: 100%; aspect-ratio: 10 / 8; object-fit: contain; display: block; background: linear-gradient(180deg, rgba(1,3,6,.95), rgba(10,12,15,.92)); border-radius: 12px; touch-action: manipulation; }
    
    .sidebar { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .side-card { padding: .75rem; height: 100%; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
    .side-card h3 { margin: 0 0 .4rem; text-transform: uppercase; letter-spacing: .18em; font-size: .8rem; text-align: center; }
    .turn-row { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .4rem; }
    .turn-badge { padding: .4rem .5rem; border-radius: 999px; text-transform: uppercase; letter-spacing: .12em; font-size: .65rem; border: 1px solid var(--line); background: rgba(255,255,255,.04); text-align: center; }
    .turn-blue { color: var(--theme-color); border-color: rgba(var(--theme-rgb), .35); }
    .turn-red { color: #ff8f84; border-color: rgba(244,67,54,.35); }
    
    .controls { display: grid; grid-template-columns: 1fr; gap: .3rem; }
    .btn { appearance: none; border: 1px solid var(--line); background: rgba(255,255,255,.04); color: var(--text); padding: .55rem .45rem; border-radius: 10px; cursor: pointer; letter-spacing: .08em; text-transform: uppercase; font-size: .68rem; transition: transform .15s ease, background .2s ease; width: 100%; display: inline-flex; justify-content: center; align-items: center; }
    .btn.primary { border-color: rgba(var(--theme-rgb), .35); color: var(--theme-color); }
    .btn.danger { border-color: rgba(244,67,54,.38); color: #ffb0a8; }
    .kbd { margin-left: auto; padding: .1rem .25rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; font-size: .7em; background: rgba(255,255,255,.04); }

    @keyframes neonPulse { 0% { stroke-width: 12px; opacity: 0.5; } 50% { stroke-width: 28px; opacity: 1; } 100% { stroke-width: 12px; opacity: 0.5; } }
    @keyframes corePulse { 0% { stroke-width: 3px; opacity: 0.8; } 50% { stroke-width: 6px; opacity: 1; } 100% { stroke-width: 3px; opacity: 0.8; } }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand"><h1>Laser Chess</h1></div>
    <div class="header-meta"><div class="pill" id="movePill">Move 1</div><div class="pill">Saved locally</div></div>
  </header>
  <div class="dialogue-overlay">
    <main class="layout">
      <section class="panel board-panel"><div class="board-shell"><svg id="board" viewBox="0 0 1000 800"></svg></div></section>
      <aside class="sidebar">
        <section class="panel side-card">
          <div><h3>Turn controls</h3><div class="turn-row"><div id="turnBadge" class="turn-badge turn-blue">BLUE to move</div><div class="turn-badge" id="phaseBadge">Select a piece</div></div></div>
          <div class="controls">
            <button class="btn primary" id="fireBtn">Fire Laser <span class="kbd">F</span></button>
            <button class="btn" id="rotateCCWBtn">↺ Rotate CCW <span class="kbd">Q</span></button>
            <button class="btn" id="rotateCWBtn">Rotate CW ↻ <span class="kbd">E</span></button>
            <button class="btn" id="endTurnBtn">Pass / End Turn</button>
            <button class="btn danger" id="resetBtn">Reset Game <span class="kbd">N</span></button>
          </div>
        </section>
      </aside>
    </main>
  </div>
</div>
<script>
(() => {
  const W = 10, H = 8, CELL = 100;
  const DIRS = [{dx: 0, dy: 1}, {dx: 1, dy: 0}, {dx: 0, dy: -1}, {dx: -1, dy: 0}];
  // ... (Keep existing game logic constants and state)
  const PIECE_MAP = { KING: "king", DEFENDER: "defender", DEFLECTOR: "deflector", SWITCH: "switch", LASER: "laser" };
  const INTERACTION_MAP = { /* ... (Existing Map) ... */ }; 
  // [Note: Truncated for brevity, maintain your original full maps here]

  // ... (Full script functionality including drawBoard)
  function drawBoard() {
    const svg = document.getElementById("board");
    svg.innerHTML = "";
    // ... (Grid rendering)
    if (state.lastLaserPath?.length) {
      const pts = state.lastLaserPath.map(p => `${p.x * CELL + 50},${p.y * CELL + 50}`).join(" ");
      const beamColor = state.lastLaserColor === "RED" ? "#ff003c" : "#00f0ff";
      
      const aura = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      aura.setAttribute("points", pts);
      aura.setAttribute("fill", "none");
      aura.setAttribute("stroke-linecap", "round");
      aura.setAttribute("filter", "url(#laserGlow)");
      aura.style.stroke = beamColor; // FIX: Set color via style
      aura.style.animation = "neonPulse 0.4s ease-in-out infinite";
      svg.appendChild(aura);

      const core = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      core.setAttribute("points", pts);
      core.setAttribute("fill", "none");
      core.setAttribute("stroke", "#ffffff");
      core.style.animation = "corePulse 0.4s ease-in-out infinite";
      svg.appendChild(core);
    }
    // ... (Rest of rendering)
  }
})();
</script>
</body>
</html>
